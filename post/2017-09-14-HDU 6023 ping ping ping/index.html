<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"ACM","articleBody":"Time Limit: 2000/1000 MS (Java/Others)\nProblemThe structure of the computer room in Northeastern University is pretty miraculous. There are $  n$ servers, some servers connect to the gateway whose $  IP$ address is $  0$ directly. All servers are connected with each other by $  n$ netting twines. It is said that this structure is favorable for maintaining physical problem of servers.But because of an unexpected rainstorm, the computer room was destroyed by a terrible thunderclap!Our maintainer Bittersweet found that many servers were not able to be visited, so he hurried to the computer room to lookup the reason. After several hours, Bittersweet realized that some net gape of servers were broken by thunderclap. However, there were too many servers to find out all the broken net gapes quickly. So he came up with an idea to assess the damaged condition roughly. Bittersweet decided to turn on some servers and ping other servers randomly, then record the unsuccessful pairs of servers.Now he need a program to analyze the record to confirm what is the minimum number of servers whose net gape was destroyed by thunderclap. Can you help him to complete this work?\nInputThere are at most $  20$ test cases.In each test case, the first line is an integer $  n (3≤n≤10^4)$, denoting the number of servers. The $  IP$ address of these servers is $  1…n$.Then follows $  n$ lines, each line contains two integers $  u$ and $  v$ $  (0≤u,v≤n)$, denoting that the server whose $  IP$ address $  is$ u is connected with the server whose $  IP$ address is$   v$ by netting twine initially.After those, there is one line contains only an integer $  p (p≤50000)$, denoting the number that Bittersweet uses ping.Then follows p lines, each line contains two integers $  U$ and $  V$ , denoting when using server $  U$ to ping server $  V$, it returned unsuccessful.\nOutput A single integer $  x$ in a line, denoting at least $  x$ servers whose net gape were broken.\nSample Input41 04 22 03 221 32 1\nSample Output1\nSource2017 ACM/ICPC Asia Regional Shenyang Online\n题解本题的贪心策略本题不是单纯地删除$lca(u,v)$，例如对于一条链上的$   (root,a1,a2,a3)$ $  lca(root, a1)=root$ $  lca(a1,a3)=a1 $；那么不是删去$  root$ 而是删去$  a1$即可断开两条通信恰好是lca深度较大的点应该删去，所以原本深度最小的$lca$没有必要删去\n解决办法问题在于删去的点一定是$  lc$a,那么每次删去$  lca$后暴力$  dfs$，把删去$  lca$的子树的所有未被标记的点都标记一遍，这样标记算法$  O(N)$，N为子树节点数，然后按照点对$  lca$的深度从深到浅处理，如果当前点对两个有一个已经被标记，说明两点已经断开了，没有必要再次删除，否则断开，标记$  lca$子树。如此贪心即可。\nCode1234567891011121314151617181920212223242526272829303132333435363738394041424344454647484950515253545556575859606162636465666768697071727374757677787980818283848586878889//好题 lca+贪心//题意：给出一棵有根树根节点标号 0，给出k个点对 (u,v)表示从u到v的路径(含u,v)上有一点坏掉，//问最少坏掉几个点#include &lt;bits/stdc++.h&gt;using namespace std;const  int maxn = 1e4 + 7;struct query &#123; int u,v,dep,lca;&#125;;bool operator &lt;(query a, query b)//排序lca深度&#123;return a.dep&lt;b.dep;&#125;priority_queue&lt;query&gt; que;#define clr(a,b) memset(a,b,sizeof(a));bool vis[maxn];namespace LCA &#123;    int head[maxn];    int edge_tot;    struct &#123;int to,next;&#125;edge[maxn&lt;&lt;1];    void addedge(int u,int v) &#123;        edge[edge_tot].to = v;        edge[edge_tot].next = head[u];        head[u] = edge_tot ++;    &#125;    int son[maxn],dep[maxn],fa[maxn],id[maxn],sz[maxn],Top[maxn];    int cnt;    void dfs(int u,int pre,int d) &#123;        dep[u] = d; fa[u] = pre; sz[u] = 1;        for(int i = head[u]; ~i; i = edge[i].next) &#123;            int v = edge[i].to;            if(v != pre) &#123;                dfs(v,u,d+1);                sz[u]+=sz[v];                if(son[u]==-1 || sz[v]&gt;sz[son[u]]) son[u]=v;            &#125;        &#125;    &#125;    void dfs2(int u,int sp) &#123;        Top[u] = sp;id[u] = cnt ++;        if(son[u]==-1) return;        dfs2(son[u], sp);        for(int i=head[u]; ~i; i =edge[i].next) &#123;            int v = edge[i].to;            if(v != son[u] &amp;amp;&amp;amp; v != fa[u])dfs2(v,v);        &#125;    &#125;    int LCA(int x,int y) &#123;        for(;Top[x]!=Top[y];dep[Top[x]]&gt;dep[Top[y]]?x=fa[Top[x]]:y=fa[Top[y]])&#123;&#125;        return dep[x]&lt;dep[y]?x:y;    &#125;    void init() &#123;        memset(son,-1, sizeof(son));        memset(head,-1, sizeof(head));        edge_tot = 0;        cnt = 0;    &#125;&#125;void dfs(int u) &#123;    vis[u]=1;    for(int i=LCA::head[u];~i;i=LCA::edge[i].next) &#123;        int v = LCA::edge[i].to;        if(!vis[v]&amp;amp;&amp;amp;LCA::dep[v]&gt;LCA::dep[u]) dfs(v);    &#125;&#125;int main() &#123;    int n;    while(scanf(\"%d\",&amp;amp;n)!=EOF) &#123;        LCA::init();clr(vis,0);while(!que.empty())que.pop();        int ans = 0;        for(int i=1;i&lt;=n;i++) &#123;            int u,v;scanf(\"%d%d\",&amp;amp;u,&amp;amp;v);//注意起点从0开始            LCA::addedge(++u,++v);LCA::addedge(v,u);        &#125;        LCA::dfs(1,0,0);LCA::dfs2(1,1);        int q;scanf(\"%d\",&amp;amp;q);        while(q--) &#123;            int u,v,lca,dep;            scanf(\"%d %d\",&amp;amp;u,&amp;amp;v);            lca = LCA::LCA(++u,++v);            dep = LCA::dep[lca];            que.push(query&#123;u,v,dep,lca&#125;);        &#125;        while(!que.empty()) &#123;            int u = que.top().u, v = que.top().v;            int lca = que.top().lca;que.pop();            if(vis[u]||vis[v]) continue;//两段点已经访问过pass            ans++;dfs(lca);        &#125;        printf(\"%d\\n\",ans);    &#125;    return 0;&#125;","url":"https://blog.luoyayu.cn/post/2017-09-14-HDU 6023 ping ping ping/index.html","headline":"HDU 6023 ping ping ping","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2017-09-13T16:00:00.000Z","dateModified":"2018-08-25T02:44:36.000Z","keywords":"ACM-LCA,ACM-贪心,ACM-树,ACM-图论","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2017-09-14-HDU 6023 ping ping ping/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
