<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"工具","articleBody":"题目\nB. Light It Uptime limit per test1 secondmemory limit per test256 megabytesinputstandard inputoutputstandard outputRecently, you bought a brand new smart lamp with programming features. At first, you set up a schedule to the lamp. Every day it will turn power on at moment $$$0$$$ and turn power off at moment $$$M$$$. Moreover, the lamp allows you to set a program of switching its state (states are &quot;lights on&quot; and &quot;lights off&quot;). Unfortunately, some program is already installed into the lamp.The lamp allows only good programs. Good program can be represented as a non-empty array $$$a$$$, where $$$0 &lt; a_1 &lt; a_2 &lt; \\dots &lt; a_{|a|} &lt; M$$$. All $$$a_i$$$ must be integers. Of course, preinstalled program is a good program.The lamp follows program $$$a$$$ in next manner: at moment $$$0$$$ turns power and light on. Then at moment $$$a_i$$$ the lamp flips its state to opposite (if it was lit, it turns off, and vice versa). The state of the lamp flips instantly: for example, if you turn the light off at moment $$$1$$$ and then do nothing, the total time when the lamp is lit will be $$$1$$$. Finally, at moment $$$M$$$ the lamp is turning its power off regardless of its state.Since you are not among those people who read instructions, and you don't understand the language it's written in, you realize (after some testing) the only possible way to alter the preinstalled program. You can insert at most one element into the program $$$a$$$, so it still should be a good program after alteration. Insertion can be done between any pair of consecutive elements of $$$a$$$, or even at the begining or at the end of $$$a$$$.Find such a way to alter the program that the total time when the lamp is lit is maximum possible. Maybe you should leave program untouched. If the lamp is lit from $$$x$$$ till moment $$$y$$$, then its lit for $$$y - x$$$ units of time. Segments of time when the lamp is lit are summed up.InputFirst line contains two space separated integers $$$n$$$ and $$$M$$$ ($$$1 \\le n \\le 10^5$$$, $$$2 \\le M \\le 10^9$$$) — the length of program $$$a$$$ and the moment when power turns off.Second line contains $$$n$$$ space separated integers $$$a_1, a_2, \\dots, a_n$$$ ($$$0 &lt; a_1 &lt; a_2 &lt; \\dots &lt; a_n &lt; M$$$) — initially installed program $$$a$$$.OutputPrint the only integer — maximum possible total time when the lamp is lit.ExamplesInput3 104 6 7Output8Input2 121 10Output9Input2 73 4Output6NoteIn the first example, one of possible optimal solutions is to insert value $$$x = 3$$$ before $$$a_1$$$, so program will be $$$[3, 4, 6, 7]$$$ and time of lamp being lit equals $$$(3 - 0) + (6 - 4) + (10 - 7) = 8$$$. Other possible solution is to insert $$$x = 5$$$ in appropriate place.In the second example, there is only one optimal solution: to insert $$$x = 2$$$ between $$$a_1$$$ and $$$a_2$$$. Program will become $$$[1, 2, 10]$$$, and answer will be $$$(1 - 0) + (10 - 2) = 9$$$.In the third example, optimal answer is to leave program untouched, so answer will be $$$(3 - 0) + (7 - 4) = 6$$$.   \n\n\n题解啦啦啦\n代码\n\n123456789101112131415161718192021222324252627282930313233343536373839404142434445464748495051525354555657585960616263646566676869707172737475767778798081// problem/1000/B#include &lt;bits/stdc++.h&gt;// 题意: 0时刻开灯, m时刻关灯, 中间的数对应开, 关, 现在让你插入一个数, 使得总开灯时间最长// 思路: 首先你在某个数位置插入数字, 要么在前1要么在后1, 插入这个数字后,前面亮灯的时间必然减少,// 后面亮灯的时间变成之前关灯的时间+本区间亮灯时长// 所以记录下第i歌数字之后关灯的时间// 枚举每个数字的前后1单位// 复杂度O(n)using namespace std;#define lowbit(x) x&amp;(-x);#define lc ((rt)&lt;&lt;1)#define rc ((rt)&lt;&lt;1|1)#define mid  ((l+r)&gt;&gt;1)#define clr(a, b) memset(a,b,sizeof(a);#define debug(a) cout&lt;&lt;#a&lt;&lt;\" = \"&lt;&lt;a&lt;&lt;endl;#define push_back pbtypedef long long ll;typedef long long LL;typedef long double ld;const ld pi = acos(-1);const int inf = 0x3f3f3f3f;const ll llinf = 0x3f3f3f3f3f3f3f3f;const int maxn = static_cast&lt;const int&gt;(1e5 + 7);int n, m, ans;int a[maxn];int f[maxn][2], sum[maxn];// f[i][0], 在i之后开灯的时间; f[i][1], 在i之后关灯的时间void func(int x, int p) &#123;    int ret = sum[x];    if (x % 2 == 0) ret += p - a[x] + f[x + 1][0];    else ret += f[x + 1][1] + a[x + 1] - p;    ans = max(ans, ret);&#125;void solve1() &#123;    cin &gt;&gt; n &gt;&gt; m;    for (int i = 1; i &lt;= n; i++) cin &gt;&gt; a[i];    a[0] = 0, a[n + 1] = m;    for (int i = n; ~i; i--) &#123; // 需要记录在i之后关灯的时长        f[i][0] = f[i + 1][1] + a[i + 1] - a[i];        f[i][1] = f[i + 1][0];    &#125;    ans = f[0][0]; // 初始为0往后的开灯时间    for (int i = 1; i &lt;= n; i++)  // sum 奇数前缀和        sum[i] = sum[i - 1] + (i % 2 ? a[i] - a[i - 1] : 0);    for (int i = 0; i &lt;= n; i++) &#123; // 除了首位, 所有数±1都需要考虑        if (a[i] + 1 == a[i + 1]) continue;        func(i, a[i] + 1);        func(i, a[i + 1] - 1);    &#125;    cout &lt;&lt; ans &lt;&lt; endl;&#125;// 该数字之前的总开灯时长+该数字之后总关灯时长+本区间改变之后的开灯时长。void solve2() &#123;    cin &gt;&gt; n &gt;&gt; m;    for (int i = 1; i &lt;= n; i++) cin &gt;&gt; a[i];    a[0] = 0, a[n + 1] = m;    for (int i = 1; i &lt;= n + 1; i++)  // sum 未做改变前的开灯时间前缀和        sum[i] = sum[i - 1] + (i % 2 ? a[i] - a[i - 1] : 0);    ans = sum[n + 1];    for (int i = 1; i &lt;= n + 1; i++) &#123;        if (a[i] - a[i - 1] &gt; 1) &#123;            if (i &amp; 1) &#123; // 改变奇数位置                ans = max(ans, sum[i] - 1 + m - a[i] - (sum[n + 1] - sum[i]));            &#125; else &#123;                ans = max(ans, sum[i] + a[i] - a[i - 1] - 1 + m - a[i] - (sum[n + 1] - sum[i]));            &#125;        &#125;    &#125;    cout &lt;&lt; ans &lt;&lt; endl;&#125;int main() &#123;    ios::sync_with_stdio(false), cin.tie(nullptr);//    solve1();    solve2();&#125;\n\n\n\n测试抓取本段题目由Python结合beautifulsoup4自动抓取\n\nC. Covered Points Counttime limit per test3 secondsmemory limit per test256 megabytesinputstandard inputoutputstandard outputYou are given $$$n$$$ segments on a coordinate line; each endpoint of every segment has integer coordinates. Some segments can degenerate to points. Segments can intersect with each other, be nested in each other or even coincide.Your task is the following: for every $$$k \\in [1..n]$$$, calculate the number of points with integer coordinates such that the number of segments that cover these points equals $$$k$$$. A segment with endpoints $$$l_i$$$ and $$$r_i$$$ covers point $$$x$$$ if and only if $$$l_i \\le x \\le r_i$$$.InputThe first line of the input contains one integer $$$n$$$ ($$$1 \\le n \\le 2 \\cdot 10^5$$$) — the number of segments.The next $$$n$$$ lines contain segments. The $$$i$$$-th line contains a pair of integers $$$l_i, r_i$$$ ($$$0 \\le l_i \\le r_i \\le 10^{18}$$$) — the endpoints of the $$$i$$$-th segment.OutputPrint $$$n$$$ space separated integers $$$cnt_1, cnt_2, \\dots, cnt_n$$$, where $$$cnt_i$$$ is equal to the number of points such that the number of segments that cover these points equals to $$$i$$$.ExamplesInput30 31 33 8Output6 2 1 Input31 32 45 7Output5 2 0 NoteThe picture describing the first example:Points with coordinates $$$[0, 4, 5, 6, 7, 8]$$$ are covered by one segment, points $$$[1, 2]$$$ are covered by two segments and point $$$[3]$$$ is covered by three segments.The picture describing the second example:Points $$$[1, 4, 5, 6, 7]$$$ are covered by one segment, points $$$[2, 3]$$$ are covered by two segments and there are no points covered by three segments. \n\n\n\nshell脚本1234567/Users/hu-osx/anaconda3/bin/python3.6 -c
