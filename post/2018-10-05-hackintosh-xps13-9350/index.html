<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":null,"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"Misc","articleBody":"引子macOS 10.13/.1从5月份稳定用到了10月，最近系统盘空间捉襟，没办法经得起编译，外置大容量SSD给了Paragon HardDisk Manager做完整分区备份以防不测。正好9月24日Mojave发布，决心抹盘重装。\n调整分区起初的想法是只抹掉macOS启动分区，留着Windows和macOS软件分区，我的分区表Windows Recovery/EFI/Windows C:/EFI(苹果)/Macintosh HD/MacMisc准备把C盘尾部切20G给Macintosh， 结果在Windows下始终无法用磁盘工具对C盘分区，在删除休眠文件、停用系统还原点、整理碎片文件、转换成动态磁盘、根据日志退出应用无果下，一怒之下进PE用DG在尾部扇区开始分区。悲剧是Windows分区彻底坏了。尝试用PE格式掉C盘，发现在安装Windows时安装程序始终无法检测到SSD，问题可能出在分区表上，斟酌再三决定用timemachine抢救下macOS。在Windows命令行模式下clean掉磁盘遂才得以安装win10，之后给EFI扩容，没多想直接在PE下，从C盘头部分区，这样竟然可以开机，大概是原先的Windows尾部碎片文件太多了。\n安装前针对XPS13的安装步骤：\n\n获取dmg镜像，比较md5，还原到U盘\n修改磁盘的EFI，找到合适的CLOVER，删掉别人的COLVER/ACPI/*，在/EFI/CLOVER/kexts/Other里打上最新的基础补丁例如Lilu.kext、FakeSMC.kext、WhateverGreen.kext、VoodooPS2Controlller.kext下面是我的基础补丁包活一个无线网卡驱动(DW1560)，按需修改config.plist, 这里我用的是macOS-Mojave-XPS13-9350https://github.com/tlefko/macOS-Mojave-XPS13-9350)\n\n安装中\n正常安装，中间会出现几次自动重启，如果遇到报错可能是无法自动重启，多试几次，如果安装的进度在变化就不用担心、否则调试五国图\n启动macOS，在四叶草界面F4，等待几分钟，进入系统，如果遇到花屏，说明DSDT没正确获取，去Windows下删掉ACPI/*, 再试启动F4/Fn+F4\n\n安装后\n挂载EFI(diskutil list / sudo diskutil mount disk0s2)\nchomd +x Deploy.sh &amp; ./Deploy.sh\n下载Clover Configurator和Kext Utility。用前者更新最新的基础kexts(kexts installer好像是新出的功能)和配置ACPI, 后者用来更新kexts缓存, 其他的诸如声卡按照AppleALC找到正确的layout id编译，或者用合适机型或者用万能声卡驱动，扬声器有噪声第一步是去音频MIDI设置里调整格式我用的是2声道 16位整数 48.0kHz\n重启，开机，timemachine还原\n有问题耐心调试，先用基础kexts开机、再配置驱动\n\n\n\n","url":"https://blog.luoyayu.cn/post/2018-10-05-hackintosh-xps13-9350/index.html","headline":"Hackintosh XPS-13-9350","image":"https://i.loli.net/2018/10/05/5bb75edd4e75d.jpg","datePublished":"2018-10-04T16:00:00.000Z","dateModified":"2018-10-05T12:53:59.264Z","keywords":"Hackintosh","description":null,"publisher":{"@type":"Organization","name":"Home","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-10-05-hackintosh-xps13-9350/index.html"},"thumbnailUrl":"https://i.loli.net/2018/10/05/5bb75edd4e75d.jpg"}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
