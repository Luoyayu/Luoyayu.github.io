<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"ACM","articleBody":"点分治在开始树上点分治前，复习下树的直径，树的重点，以及深度，分治小知识。\n树的直径两遍$dfs()$,第一次求出直径的一个端点，第二次求出以该端点为根的最长路，即为直径。\n123456789101112131415161718192021222324252627282930313233343536373839404142434445464748495051525354555657585960616263#include &lt;bits/stdc++.h&gt;using namespace std;const int maxn = 1e5 + 7;const int inf = 0x3f3f3f3f;struct node &#123;    int to,next;    int w;&#125;e[maxn];int ecnt, head[maxn];int dis[maxn];void addedge2(int u, int v ,int w) &#123;    e[ecnt] = node&#123;u, head[v], w&#125;; head[v] = ecnt++;    e[ecnt] = node&#123;v, head[u], w&#125;; head[u] = ecnt++;&#125;void init()&#123;    memset(dis,-inf, sizeof(dis));    memset(head, -1, sizeof(head));    ecnt = 0;&#125;void dfs(int u, int fa, int d) &#123; //传入当前深入的距离便于回溯    for (int i = head[u]; ~i; i = e[i].next) &#123;        int v = e[i].to, w = e[i].w;        if (v == fa) continue;        dis[v] = w + d;        dfs(v, u, dis[v]);    &#125;&#125;int main() &#123;    int n, m;    init();    scanf(\"%d%d\", &amp;amp;n, &amp;amp;m);    for (int i = 0; i &lt; m; i++) &#123;        int u, v, w;        scanf(\"%d%d%d\", &amp;amp;u, &amp;amp;v, &amp;amp;w);        addedge2(u, v, w);    &#125;    int st = 1;    dfs(st, -1, 0);    int idx = -1, MAX = -inf;    for (int i = 1; i &lt;= n; i++) &#123;        if (dis[i] &gt; MAX)            idx = i, MAX = dis[i];    &#125;    dis[idx] = 0, MAX = -1;    dfs(idx, -1, 0);    for (int i = 1; i &lt;= n; i++)MAX = max(MAX, dis[i]);    return !printf(\"%d\\n\", MAX);&#125;/ * Sample input7 61 2 32 3 42 4 24 5 54 6 15 7 3Sample output14 * /\n树的重心在树中找到一个点，使其所有的子树中最大的子树含有的节点是最少的。\n\n两遍搜索，第一次随便定一个根，搜出每个孩子的子节点son[u],第二遍搜出使得max(son[u],n-1-son[u])最小的节点，即为重心。\n转换成一遍搜索：在每次递归算一下儿子的最大值，每层算一下最大值的最小值。\n\n12345678910111213141516171819202122232425262728293031323334353637383940414243444546474849505152535455565758596061626364656667//#include &lt;bits/stdc++.h&gt;#include &lt;cstdio&gt;#include &lt;algorithm&gt;#include &lt;cstring&gt;using namespace std;const int maxn = 1e5 + 7;const int inf = 0x3f3f3f3f;struct node &#123;    int to, next;    int w;&#125;e[maxn];int ecnt, head[maxn];int son[maxn];void addedge2(int u, int v,int w) &#123;    e[ecnt] = node&#123;u, head[v], w&#125;; head[v] = ecnt++;    e[ecnt] = node&#123;v, head[u]&#125;, w; head[u] = ecnt++;&#125;int n,m;void init() &#123;    memset(son, 0, sizeof(son));    memset(head, -1, sizeof(head));    ecnt = 0;&#125;int siz, ans;bool vis[maxn];void dfs1(int u, int fa) &#123;    son[u] = 1;    int res = -inf;    for (int i = head[u]; ~i; i = e[i].next) &#123;        int v = e[i].to;        if (v == fa || vis[v]) continue;        dfs1(v, u);        son[u] += son[v];        res = max(res, son[v] - 1);    &#125;    res = max(res, n - son[u]);    if (res &lt; siz) &#123;        ans = u;        siz = res;    &#125;&#125;int main() &#123;    init();    scanf(\"%d%d\", &amp;amp;n, &amp;amp;m);    for (int i = 0; i &lt; m; i++) &#123;        int u, v, w;        scanf(\"%d %d %d\", &amp;amp;u, &amp;amp;v, &amp;amp;w);        addedge2(u, v, w);    &#125;    int st = 1;    memset(vis, 0, sizeof(vis));    ans = 0, siz = inf;    dfs1(st, 0);    printf(\"%d\\n\", ans);&#125;/*Sample input7 61 2 32 3 42 4 24 5 54 6 15 7 3Sample output4*/\nPOJ 1655 模板题题意：求出树的平衡因子balance即确定重心后最大子树规模-1，注意输出重心小的优先。\n\n\n树的点分治一种高效的用来解决树上的路径问题的算法思想\n以树的重心为根转换无根树为有根树，这样可以保证分而治之的子树规模相当，且有任何一颗子树的大小都不超过原来树大小的一半。\n最坏情况下树会退化成一条链普通枚举要上到$O(n^2+n)$\nPOJ 1741 Tree题意给出一棵树，问有多少$pair(u,v)$使得$dis(u,v)\\le k$\n暴力复杂度$O(n^2)$\n分治思想：联想算法导论最大子数组的和，一条路径要么经过根节点，要么在根节点的一棵子树上，那么不妨对树“剖分”。\n先求出经过根节点的路径数目，再对子树的根节点递归处理。重点处理跨越根的路径。可套尺取，先求出到根节点的距离$dis[u]$，复杂度$O(n)$\n排序$dis$问题转换成尺取，即在有序数组$dis$中找到数对满足和小于$k$，$O(n)$即可\n但注意在降维后选择两点时会出现走重复路的情况也会被算在内，此时以孩子为实根，其父节点为虚根，dis[u]=e[i].w，减去在该虚根和实根下，路径长度小于k的对数。\nCode\n\nto be continue…\n","url":"https://blog.luoyayu.cn/post/2018-02-09-点分治/index.html","headline":"点分治","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2018-02-08T16:00:00.000Z","dateModified":"2018-08-25T02:54:33.000Z","keywords":"ACM-树,ACM-点分治,ACM-分治,ACM-总结","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-02-09-点分治/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
