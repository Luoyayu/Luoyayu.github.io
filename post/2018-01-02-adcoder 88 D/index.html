<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"ACM","articleBody":"Time limit : 2sec / Memory limit : 256MBYou are given a string $S$ consisting of 0 and 1. Find the maximum integer $K$ not greater than $|S|$ such that we can turn all the characters of $S$ into 0 by repeating the following operation some number of times.Choose a contiguous segment $[l,r]$ in $S$ whose length is at least $K$ (that is,$r-l+1\\geq K$ must be satisfied). For each integer $i$ such that $l\\leq i\\leq r$, do the following: if $S_i$ is 0, replace it with 1; if $S_i$ is 1, replace it with 0.\nConstraints$1\\leq|S|\\leq10^5$$S_i(1\\leq i\\leq N)$ is either 0 or 1.\n題解給一個01字符串，每次衹能選一個大於等於$K$的連續區間[l,r]，在[l,r]中所有的0變1，1變0，最後使得01字符串全0，求最大的$K$\n思路：對於第$k$個使得S[k]!=S[k+1]的字符我們可以選取區間[1,k]或[k+1,len(S)]反轉來使得他們相等對於此我們最大可以選max(k,len(S)-k)，猜測遍歷一遍取最小的max即爲ans。證明：字符串 $1…..K-1,K,K+1,……N$若$k$出現在$[1,N-k]$，可以反轉$[k+1,N]$和 $[k,N]$ 來$flip \\ S_k$若$k$出現在$[N-k,N]$，可以反轉$[1,k]$和$[1,k+1]$ 來$flip \\ S_k$綜上每次都可以選擇長度比較大的進行反轉\n123456789101112131415#include &lt;bits/stdc++.h&gt;using namespace std;const int maxn = 1e5+7;const int inf = 0x3f3f3f3f;char ss[maxn];int main() &#123;   scanf(\"%s\", ss + 1);   int ans = inf;   int len = strlen(ss + 1);   for (int i = 1; i &lt;= len; i++) &#123; //如果不存在不等和最后一個字符'\\0'比較即可       if (ss[i] != ss[i + 1])           ans = min(ans, max(i, len - i));   &#125;   return !printf(\"%d\\n\", ans);&#125;","url":"https://blog.luoyayu.cn/post/2018-01-02-adcoder 88 D/index.html","headline":"Atcoder 88 D-Wide Flip","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2018-01-01T16:00:00.000Z","dateModified":"2018-08-25T02:46:45.000Z","keywords":"ACM-atcoder","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-01-02-adcoder 88 D/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
