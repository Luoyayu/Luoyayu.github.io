<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"Blog","articleBody":"测试 行内LaTeX\n测试主题使用Angular搭建目前没有服务动态加载Mathjax解析脚本, 多校结束准备研究下前端基本框架\n\n$x_i*y_j^2$ $y_{k}^{[0]}=A^{[0]}(\\omega_{\\frac{n}{2}}^k)$\n$\\displaystyle sum = \\sum_{i=1}^na_i$\n$\\mathbf{X}=\\begin{pmatrix}(\\mathbf{x}^{(1)})^T \\\\ (\\mathbf{x}^{(2)})^T \\\\ (\\mathbf{x}^{(3)})^T \\\\ \\cdot \\cdot \\cdot \\\\ (\\mathbf{x}^{(m)})^T\\end{pmatrix}$\n$\\Omega^TA\\Omega=\\begin{pmatrix}\\begin{pmatrix}a_1&amp;b_1 \\\\ -b_1&amp;a_1\\end{pmatrix}\\\\&amp;\\ddots\\\\&amp;&amp;\\begin{pmatrix}a_s&amp;b_s \\\\ -b_s&amp;a_s\\end{pmatrix}\\\\&amp;&amp;&amp;\\lambda_{2s+1}\\\\&amp;&amp;&amp;&amp;\\ddots\\\\&amp;&amp;&amp;&amp;&amp;\\lambda_n\\end{pmatrix}$$\\begin{pmatrix}a&amp;*\\\\0&amp;b\\end{pmatrix}$\n测试 行间公式\\displaystyle y_k=y_k^{[0]}+w_n^ky_k^{[1]} =A^{[0]}(\\omega_{\\frac{n}{2}}^k)+w_n^kA^{[1]}(\\omega_{\\frac{n}{2}}^k)=A^{[0]}(\\omega_n^k)+w_n^kA^{[1]}(\\omega_n^k)=A(\\omega_n^k)H(y,\\hat{y}) = - \\frac{1}{n} \\sum_n \\sum_i y_{i,n} \\log (\\hat{y}_{i,n})\n\\frac{\\partial u}{\\partial t} = h^2 \\left( \\frac{\\partial^2 u}{\\partial x^2} + \\frac{\\partial^2 u}{\\partial y^2} + \\frac{\\partial^2 u}{\\partial z^2}\\right)\nf\\left(\n    \\left[\n        \\frac{\n            1+\\left\\{x,y\\right\\}\n        }{\n        \\left(\n            \\frac{x}{y}+\\frac{y}{x}\n        \\right)\n        \\left(u+1\\right)\n        }+a\n    \\right]^{\\frac{3}{2}}\n\\right)来自多校round-4 H.Eat Cards, Have Fun无情公式推导\n\n\\displaystyle \n\\begin{aligned} \n\\sum_{k = 1} ^ {\\infty} & {(1 - (1 - p) ^ k) ^ l ((1 - p) ^ k) ^ {i - 1 - l} p (1 - p) ^ {k - 1} (1 - (1 - p) ^ {k - 1}) ^ r ((1 - p) ^ {k - 1}) ^ {n - i - r}}  \\\\  \n= & p \\sum_{k = 1} ^ {\\infty} {(1 - p) ^ {k(i - 1 - l) + k - 1 + (k - 1)(n - i - r)} \\sum_{x = 0} ^ {l} {\\binom{l}{x} (-1) ^ x (1 - p) ^ {xk}} \\sum_{y = 0} ^ {r} {\\binom{r}{y} (-1) ^ y (1 - p) ^ {y(k - 1)}}} \\\\ \n= & p \\sum_{x = 0} ^ {l} \\sum_{y = 0} ^ {r} {(-1) ^ {x + y} \\binom{l}{x} \\binom{r}{y} \\sum_{k = 1} ^ {\\infty} {(1 - p) ^ {k(i - 1 - l) + k - 1 + (k - 1)(n - i - r) + xk + y(k - 1)}}} \\\\ \n= & p \\sum_{x = 0} ^ {l} \\sum_{y = 0} ^ {r} {(-1) ^ {x + y} \\binom{l}{x} \\binom{r}{y} \\sum_{k = 0} ^ {\\infty} {(1 - p) ^ {k (n - l - r + x + y) + (i - 1 - l + x)}}} \\\\ \n= & p \\sum_{x = 0} ^ {l} \\sum_{y = 0} ^ {r} {(-1) ^ {x + y} \\binom{l}{x} \\binom{r}{y} \\frac{(1 - p) ^ {i - 1 - l + x}} {1 - (1 - p) ^ {n - l - r + x + y}}} \n\\end{aligned}\n\\require{enclose}\\begin{array}{}\n\\enclose{horizontalstrike}{x+y}\\\\\n\\enclose{horizontalstrike}{x*y}\\\\\n\\end{array}测试 cpp123456789101112131415161718192021222324252627282930313233343536373839404142434445464748495051525354555657585960616263646566676869707172737475767778#include &lt;bits/stdc++.h&gt;using namespace std;//题意:给出括号序列染色要求/*1.括号要么不被染色要么染成红或蓝色 *2.相邻的括号要染色保持不同 *3.相匹配的括号有且只有一个被染色 */// dp[l][r][x][y]为[l,r]表示给[l,r]染色且端点l染x色，右端点r染y色// &lt;0,1,2&gt;分别为&lt;plain, red, blue&gt; if &lt;l,r&gt; is matched// ,那么由去掉这个嵌套的dp[l+1][r-1][x][y]转移出dp[l][r][x][y]枚举l+1,r-1的颜色/* i-&gt;l+1; j-&gt;r-1; * if(i!=1) dp[l][r][1][0]=(dp[l][r][1][0] + dp[l+1][r-1][i][j])%mod; * if(i!=2) dp[l][r][2][0]=(dp[l][r][2][0] + dp[l+1][r-1][i][j])%mod; * if(j!=1) dp[l][r][0][1]=(dp[l][r][0][1] + dp[l+1][r-1][i][j])%mod; * if(j!=2) dp[l][r][0][2]=(dp[l][r][0][2] + dp[l+1][r-1][i][j])%mod; */// if &lt;l,r&gt; isn't matched 那么可以找到和l匹配的括号位置mid,// 求出dp[l][mid][][]和dp[mid+1][r][][]枚举l,mid,mid+1,r这四个位置的颜色i,j,x,y// 有转移方程 if(j*x==0||j!=x) // dp[l][r][i][y] = (dp[l][r][i][y] + dp[l][mid][i][j] * dp[mid+1][r][x][y]%mod)%mod;typedef long long ll;const int maxn = 700 + 7;const int mod = int(1e9 + 7);int belong[maxn];ll dp[maxn][maxn][3][3];char ss[maxn];void dfs(int l, int r) &#123;    if (r - l == 1) &#123;        dp[l][r][0][1] = dp[l][r][0][2] = dp[l][r][1][0] = dp[l][r][2][0] = 1;        return;    &#125;    if (belong[l] == r) &#123;        dfs(l + 1, r - 1);  //一直递归到小区间处理        for (int i = 0; i &lt; 3; i++)            for (int j = 0; j &lt; 3; j++) &#123;                if (i != 1) dp[l][r][1][0] = (dp[l][r][1][0] + dp[l + 1][r - 1][i][j]) % mod;                if (i != 2) dp[l][r][2][0] = (dp[l][r][2][0] + dp[l + 1][r - 1][i][j]) % mod;                if (j != 1) dp[l][r][0][1] = (dp[l][r][0][1] + dp[l + 1][r - 1][i][j]) % mod;                if (j != 2) dp[l][r][0][2] = (dp[l][r][0][2] + dp[l + 1][r - 1][i][j]) % mod;            &#125;    &#125; else &#123;        int mid = belong[l];        dfs(l, mid);        dfs(mid + 1, r);        for (int i = 0; i &lt; 3; i++)            for (int j = 0; j &lt; 3; j++)                for (int x = 0; x &lt; 3; x++)                    for (int y = 0; y &lt; 3; y++)  &#123;//&lt;i,j&gt;, &lt;x,y&gt;                        if (j * x != 0 &amp;&amp; j == x) continue;                        dp[l][r][i][y] = (dp[l][r][i][y] + dp[l][mid][i][j] * dp[mid + 1][r][x][y] % mod) %mod;                    &#125;    &#125;&#125;int main() &#123;    while (scanf(\"%s\", ss) != EOF) &#123;        int len = strlen(ss);        for (int i = 0; i &lt; len; i++)  //处理匹配            if (ss[i] == '(') &#123;                int cnt = 0;                for (int j = i; j &lt; len; j++) &#123;                    if (ss[j] == '(') cnt++;                    else cnt--;                    if (cnt == 0) &#123;                        belong[i] = j;                        break;                    &#125;                &#125;            &#125;        memset(dp, 0, sizeof(dp));        dfs(0, len - 1);        ll ans = 0;        for (int i = 0; i &lt; 3; i++)            for (int j = 0; j &lt; 3; j++)                ans = (ans + dp[0][len - 1][i][j]) % mod;        printf(\"%lld\\n\", ans);    &#125;&#125;\n测试 折叠golang代码\n123456789101112131415161718192021222324252627282930313233343536373839404142434445464748495051525354555657585960616263646566676869707172737475767778798081828384858687888990919293949596979899100101102103104package mainimport (\t\"bufio\"\t\"fmt\"\t\"io\"\t\"log\"\t\"math\"\t\"net/http\"\t\"os\"\t\"strconv\"\t\"strings\"\t\"sync\")var mu sync.Mutex // 共享变量var count int// ServerStart 开始服务器监听func ServerStart() &#123;\tfmt.Println(\"WEB START, HTTP LISTEN PORT 2333\")\thttp.HandleFunc(\"/\", UpdateCounterAndPrintMore)\thttp.HandleFunc(\"/count\", counter)\thttp.HandleFunc(\"/drawfun\", HandleQuest)\thttp.HandleFunc(\"/code\", ShowCode)\tlog.Fatal(http.ListenAndServe(\"10.0.0.103:2333\", nil))&#125;func counter(w http.ResponseWriter, r *http.Request) &#123;\tmu.Lock()\tfmt.Fprintf(w, \"Count %d\\n\", count)\tmu.Unlock()&#125;// UpdateCounterAndPrintMore 跟新计数器状态并且打印请求头更多的内容func UpdateCounterAndPrintMore(w http.ResponseWriter, r *http.Request) &#123;\tmu.Lock() //共享变量加锁\tcount++\tmu.Unlock()\t// fmt.Fprintf(w, \"URL.Path=%q\\n\", r.URL.Path)\t// Request 结构体\tfmt.Fprintf(w, \"%s %s %s\\n\", r.Method, r.URL, r.Proto)\tfor k, v := range r.Header &#123;\t\tfmt.Fprintf(w, \"Header[%q]=%q\\n\", k, v)\t&#125;\tfmt.Fprintf(w, \"Host=%q\\n\", r.Host)\tfmt.Fprintf(w, \"RemoteAdd=%q\\n\", r.RemoteAddr)\tif err := r.ParseForm(); err != nil &#123; // 限制作用域\t\tlog.Print(err)\t&#125;\tfor k, v := range r.Form &#123;\t\tfmt.Fprintf(w, \"Form[%q]=%q\\n\", k, v)\t&#125;&#125;//HandleQuest 处理URL中的?引起的请求func HandleQuest(w http.ResponseWriter, r *http.Request) &#123;\tw.Header().Set(\"Content-Type\", \"image/svg+xml\") // 写svg类型文件\t// width, height, cells, funstring, angle\tquery := r.URL.RawQuery\tQ := strings.Split(query, \"?\")\twidth, height, cells, angle = 600, 320, 100, math.Pi/6\tFunctionstring = \"sin(sqrt(x*x+y*y))/sqrt(x*x+y*y)\"\tfor _, q := range Q &#123;\t\tswitch &#123;\t\tcase strings.HasPrefix(q, \"width=\"):\t\t\twidth, _ = strconv.Atoi(q[6:])\t\tcase strings.HasPrefix(q, \"height=\"):\t\t\theight, _ = strconv.Atoi(q[7:])\t\tcase strings.HasPrefix(q, \"cells=\"):\t\t\tcells, _ = strconv.Atoi(q[6:])\t\tcase strings.HasPrefix(q, \"angle=\"):\t\t\tangle, _ = strconv.ParseFloat(q[6:], 64)\t\t\t// angle /= 360\t\tcase strings.HasPrefix(q, \"func=\"):\t\t\tFunctionstring = q[5:]\t\t&#125;\t&#125;\tsin30, cos30 = math.Sin(angle), math.Cos(angle)\tfmt.Printf(\"请求 width=%d height=%d cells=%d angle=%f\\n\", width, height, cells, angle)\tfmt.Printf(\"函数: %s\\n\", Functionstring)\tf, _ := os.Create(\"fun_sample.svg\")\twg.Add(cells * cells)\tSurface(f)\twg.Wait()\tfmt.Fprintln(f, \"&lt;/svg&gt;\")\tfmt.Println(\"完成绘制任务\")\t\tf, _ = os.Open(\"fun_sample.svg\")\tio.Copy(w, f)\tf.Close()&#125;// ShowCode 响应源码请求func ShowCode(w http.ResponseWriter, f *http.Request) &#123;\tfileF, _ := os.Open(\"code.txt\")\tinput := bufio.NewScanner(fileF)\tfor input.Scan() &#123;\t\tfmt.Fprintln(w, input.Text())\t&#125;&#125;\n\n\n\n测试 Gist\n测试主题暂时不支持\n\n\n\n测试第三方脚本\n\n\n\n测试 Include Code 莫队算法-小Z的袜子view raw123456789101112131415161718192021222324252627282930313233343536373839404142434445464748495051525354555657585960#include &lt;bits/stdc++.h&gt;using namespace std;#define clr(a, b) memset(a, b, sizeof(a));#define debug(x) cout &lt;&lt; #x &lt;&lt; \" = \" &lt;&lt; x &lt;&lt; endl;#define y2 Y2/* 莫队算法 * BZOJ 2038 小Z的袜子 * 设查询的区间长度为n, ANS = \\frac{\\sum_{i=0}^{color_n} sum[i]*(sum[i]-1) }{n(n-1)} * 莫队算法巧妙的做离线SORT，可以在两个询问之间快速做状态跳转。 * l指针向左移动一个单位，r指针向右移动一个单位，这些状态都可以在O(1)时间完成跳转 * 其优化基于分块的双关键词：若l在同块，则以r作为排序关键词；若l不在同块，将l作为排序关键词 * 思路：*/typedef long long ll;const int maxn = 5e5 + 7;struct Mo {\tint l, r ,idx;\tll A, B;}q[maxn]; // 询问inline ll S(ll x ) { return x*x; }int n, m, color[maxn];int block_size, belong[maxn];ll sum[maxn], ans;bool cmp(const Mo &amp;a, const Mo &amp;b) {\treturn belong[a.l]==belong[b.l] ? a.r &lt; b.r : a.l &lt; b.l;}bool CMP(const Mo &amp;a, const Mo &amp;b) { return a.idx &lt; b.idx; }inline void revise(int x, int add) { // O(1) 转移\tans -= S(sum[color[x]]);\tsum[color[x]] += add; // 第x种颜色加上add个\tans += S(sum[color[x]]);}int main() {\tstd::ios::sync_with_stdio(false), cin.tie(0);\tcin &gt;&gt; n &gt;&gt; m;\tblock_size = sqrt(n);\tfor(int i=1;i&lt;=n;i++) cin &gt;&gt; color[i], belong[i]=i/block_size+1;\tfor(int i=1;i&lt;=m;i++) cin &gt;&gt; q[i].l &gt;&gt; q[i].r, q[i].idx = i;\tsort(q+1, q+m+1, cmp);\tint l=1, r=0;\tfor(int i=1;i&lt;=m;i++) {\t\twhile(l&lt;q[i].l) revise(l,  -1), l++;\t\twhile(l&gt;q[i].l) revise(l-1, 1), l--;\t\twhile(r&lt;q[i].r) revise(r+1, 1), r++;\t\twhile(r&gt;q[i].r) revise(r,  -1), r--;\t\t\t\tif(q[i].l == q[i].r) {\t\t\tq[i].A =0, q[i].B = 1;\t\t\tcontinue;\t\t}\t\tint N = q[i].r - q[i].l + 1;\t\tq[i].A = ans - N;\t\tq[i].B = 1LL*N*(N-1);\t\tll gcd = __gcd(q[i].A, q[i].B);\t\tq[i].A /= gcd, q[i].B /=gcd;\t}\tsort(q+1, q+m+1, CMP);\tfor(int i=1;i&lt;=m;i++) cout &lt;&lt; q[i].A &lt;&lt; \"/\" &lt;&lt; q[i].B &lt;&lt; endl;\t}\n测试 引用块Lorem ipsum dolor sit amet, consectetur adipiscing elit. Pellentesque hendrerit lacus ut purus iaculis feugiat. Sed nec tempor elit, quis aliquam neque. Curabitur sed diam eget dolor fermentum semper at eu lorem.\nauthor source link source_link_title\n测试YouTuBe\n 尺寸呈现与默认主题行为不一致, 无法自定义size\n\n\n测试 iframe\n\n给hexo默认markdown引擎加上To-Do Listadd to  hexo-renderer-kramed/lib/renderer.js\n1234567891011// Support To-Do ListRenderer.prototype.listitem = function(text) &#123;  var result;  if (/^\\s*(&lt;p&gt;\\s*)?\\[[x ]\\]\\s*/i.test(text)) &#123;    text = text.replace(/^\\s*(&lt;p&gt;\\s*)?\\[ \\]\\s*/i, '&lt;input type=\"checkbox\" disabled&gt;&lt;/input&gt; ').replace(/^\\s*(&lt;p&gt;\\s*)?\\[x\\]\\s*/i, '&lt;input type=\"checkbox\" checked disabled&gt;&lt;/input&gt; ');    result = '&lt;li style=\"list-style: none\"&gt;' + text + '&lt;/li&gt;\\n';  &#125; else &#123;    result = '&lt;li&gt;' + text + '&lt;/li&gt;\\n';  &#125;  return result;&#125;;\n就这样，开始吧\n 迁移WordPress至Hexo。\n 每周至少一篇记录生活，反思现状。\n 至少把这个主题的框架搞懂了。\n 开学跟进机器学习，现阶段打好ACM，拿铁不想喝了。\n\nHexo配置Hexo目录结构\n自用修改\nhexo-renderer-kramed/lib/renderer.js 添加支持TODO\nthemes/inside/layout/index.ejs 添加了baidu-site-verificatio, theme.plugins.mathjax, cf CSS\n 12345678&lt;% if (theme.plugins.mathjax) &#123; %&gt;    &lt;script type=\"text/x-mathjax-config\"&gt;    MathJax.Hub.Config(&#123; tex2jax: &#123; inlineMath: [['$','$'], ['$$$','$$$'],['\\\\(','\\\\)']] &#125; &#125;);    &lt;/script&gt;    &lt;%- js('https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-MML-AM_CHTML') %&gt;&lt;% &#125; %&gt;&lt;link rel=\"stylesheet\" href=\"ttypography.css\" type=\"text/css\" charset=\"utf-8\" /&gt;&lt;link rel=\"stylesheet\" href=\"problem-statement.css\" type=\"text/css\" charset=\"utf-8\" /&gt;\n\nthemes/inside/source 添加了cf的两个CSS problem-statement.css ,ttypography.css\n\n\n","url":"https://blog.luoyayu.cn/post/2018-08-02-hello-world/index.html","headline":"Hello World","image":"https://i.loli.net/2018/09/02/5b8b9e49cf107.png","datePublished":"2018-07-21T13:10:51.000Z","dateModified":"2018-09-02T08:24:56.000Z","keywords":"hexo,life","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-08-02-hello-world/index.html"},"thumbnailUrl":"https://i.loli.net/2018/09/02/5b8b9e49cf107.png"}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
