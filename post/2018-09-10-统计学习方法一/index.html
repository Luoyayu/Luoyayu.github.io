<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"Machine Learning","articleBody":"第一章 统计学习方法概论\n统计学习基本假设&amp;统计学习前提：同类数据之间有一定的统计规律统计学习方法包括模型的假设空间、模型选择的准则、模型学习的方法统计学习三要素：model、strategy、algorithm实现统计学习方法的步骤：\n\n得到有限训练集合\n确定所有可能模型的假设空间，即学习模型的集合\n确定模型选择的准则，即学习的策略\n实现求解最优模型的算法，即学习的算法\n选择最优模型\n对新数据进行预测或分析\n\n计算机科学的三维：系统、计算、信息。\n监督学习基本概念input space, output space, instance, feature vector, feature space一般来说输入空间与特征空间为相同的空间，有时候实例从输入空间映射到特征空间，总的来说模型实际上是定义在特征空间上的。输入变量$X$ ,输出变量$Y$,输入变量的取值$x$, 输出变量的取值$y$例如输入实例$x$的特征向量记作\n\nx=(x^{(1)}, x^{(2)},...,x^{(i)},...,x^{(n)})^T其中$x^{(i)}$表示$x$的第$i$个特征，$x_i$表示输入变量中的第$i$个，故一个实例的特征向量是一个行向量，训练集通常表示为\n\nT=\\{(x_1,y_1),(x_2,y_2),...,(x_N,y_N)\\}监督学习假设输入变量与输出变量的随机变量$X$和$Y$遵循联合概率分布$P(X,Y)$, 对于学习系统来说这个分布函数或者分布密度函数是未知的监督学习的模型可以是概率模型或非概率模型，这取决于要学的映射关系是条件概率分布$P(X|Y)$还是决策函数$Y=f(X)$表示\n问题的形式化 \n 对于实际预测，对于给定的测试样本集中的输入$x_{N+1}$，由模型$y_{N+1}=\\underset{y_{N+1}}{arg\\ max}\\hat{P}(y_{N+1}|x_{N+1})$或$y_{N+1}=\\hat{f}(x_{N+1})$输出预测$y_{N+1}$\n统计学习三要素方法=模型+策略+算法\n模型假设空间用$\\mathcal{F}$表示，例如可以定义为决策函数的集合\n\n\\mathcal{F}=\\{f|Y=f(X)\\}\\tag{1.1}$X$和$Y$是定义在输入空间$\\mathcal{X}$和输出空间$\\mathcal{Y}$上的变量，此时$\\mathcal{F}$是由一个参数向量决定的函数族\n\n\\mathcal{F}=\\{f|f_\\theta(X),\\theta \\in \\mathbf{R}^n\\}\\tag{1.2}同样也可以定义为条件概率的集合\n\n\\mathcal{F}=\\{P|P(Y|X)\\}\\tag{1.3}此时$\\mathcal{F}$通常是由参数向量决定的条件概率分布族\n\n\\mathcal{F}=\\{P|P_\\theta(Y|X),\\theta \\in \\mathbf{R}^n\\}\\tag{1.4}策略损失/代价函数度量预测错误的程度，记作$L(Y,f(X))$常见的损失函数\n\n0-1损失函数(0-1 loss function)\n平方损失函数(quadratic loss function)\n绝对损失函数(absolute loss function)\n对数损失函数(logarithmic loss function)\n\n根据统计学基本前提模型的输入、输出之间遵循联合概率分布$P(X,Y)$，故损失函数的期望为：\n\nR_{exp}(f)=E_p[L(Y,f(X))]=\\int_{\\mathcal{X}\\times \\mathcal{Y}}L(y,f(x))P(x,y)dx dy\\tag{1.9}上式为理论模型的期望损失/风险函数，因概率分布未知，所以只能通过训练集上的经验损失(empirical loss)逼近期望损失(expected loss)\n\nR_{emp}(f)=\\frac{1}{N}\\sum_{i=1}^NL(y_i,f(x_i))\\tag{1.10}考虑到训练样本数目有限，需要调整经验风险，为此我们需要兼顾++经验风险最小化和结构风险最小化++\n根据经验风险最小化(empirical risk minimization, ERM)求得的模型适用于数据量很大的情况，此时按照ERM求最优模型就是求解最优化问题：\n\n\\underset{f\\in \\mathcal{F}}{min}\\frac{1}{N}\\sum_{i=1}^NL(y_i,f(x_i))\\tag{1.11}极大似然估计(maximum likelihood estimation)就是经验风险最小化的例子。当模型是条件概率分布，损失函数是对数损失函数时，经验风险最小化等价于极大似然估计。当样本容量很小时，ERM学习的效果较差，产生过拟合(over-fitting)现象。结构风险最小化(structural risk minimization, SRM), 为了防止模型过拟合，等价于正则化(regularization)。通常结构风险在经验风险上加上表示模型复杂度的正则化项(regularizer)或罚项(penalty term)\n\nR_{SRM}(f)=\\frac{1}{N}\\sum_{i=1}^NL(y_i,f(x_i))+\\lambda J(f)\\tag{1.12}$J(f)$为模型的复杂度，其实定义在$\\mathcal{F}$上的泛函, $\\lambda$是用以权衡经验风险和模型的复杂度。监督学习的问题由此转换为ERM或SRM的最优化问题:\n\n\\underset{f\\in\\mathcal{F}}{min}\\frac{1}{N}\\sum_{i=1}^NL(y_i,f(x_i))+\\lambda J(f)\\tag{1.13}算法算法指的是如何高效求解最优化问题，包活显式的解析解，全局最优解。\n模型评估与模型选择训练误差与测试误差假设学到的模型是$Y=\\hat{f}(x)$，训练误差是模型关于训练集的平均损失：\n\nR_{emp}(f)=\\frac{1}{N}L(y_i,\\hat{f}(x_i))\\tag{1.14}测试误差：\n\ne_{test}=\\frac{1}{N'}\\sum_{i=1}^{N'}L(y_i, \\hat{f}(x_i))\\tag{1.15}测试误差反映模型的泛化能力(generalization ability)\n过拟合与模型选择模型选择(model selection)旨在避免过拟合(over-fitting)并提高模型的预测能力\n\n设模型为\n\nf_M(x,w)=\\sum_{j=0}^Mw_jx^j$w_0,..,w_M$ 共计$M+1$个参数，问题等价于求解以下的经验最小化:\n\nL(w)=\\frac{1}{2}\\sum_{i=1}^N(f(x_i,w)-y_i)^2\\tag{ 1.18}将模型带入损失函数得：\n\nL(w)=\\frac{1}{2}\\sum_{i=1}^N(\\sum_{j=0}^Mw_jx_i^j-y_i)^2对$w_j$求偏导数，得(固定$j$展开平方求导)：\n\n\\frac{dL(w)}{dw_j}=\\frac{d(w_j^2x_i^{2j}-2w_jx_i^jy_i+y_i^2)}{2dw_j}=\\frac{1}{2}\\sum_{i=1}^N(2w_jx_i^{2j}-2x_i^jy_i)上式同除以$x_i^{j-1}$并令偏导数为0，得：\n\nw_j=\\frac{\\displaystyle \\sum_{i=1}^Nx_iy_i}{\\displaystyle \\sum_{i=1}^Nx_i^{j+1}},\\;\\;j=0,1,2,.,M可见多项式的次数M影响模型的泛化能力\n\n正则化与交叉验证正则化通过增加罚项来约束模型的复杂度，可以从奥卡姆剃刀或者贝叶斯估计角度来解释简单的模型更优。\n交叉验证常用的是S折交叉验证\n泛化能力泛化误差泛化误差(generalization error)其实就是学习方法学习到的模型的期望风险$R_{exp}$。\n泛化误差上界我们通过比较学习方法之间的泛化误差上界(generalization error bound)来比较优劣，泛化误差上界通常是关于样本容量、假设空间的函数。\n以二分类任务为例子已知训练集$T=\\{(x_1,y_1),(x_2,y_2),…,(x_N,y_N)\\}$，从联合该利率分布$P(X,Y)$独立同分布产生，$X\\in \\mathbf{R}^n$, $Y\\in {-1,1}$, 假设空你是有限函数集合$\\mathcal{F}=\\{f_1,f_2,…,f_d\\}$，损失函数采取0-1损失函数。则关于$f$的期望损失和经验风险是：\n\nR(f)=E[L(Y,F(X))]\\tag{1.21}\n\\hat{R}(f)=\\frac{1}{N}\\sum_{i=1}^NL(y_i, f(x_i))\\tag{1.22}经验风险最小化函数：\n\nf_N=\\underset{f\\in\\mathcal{F}}{arg\\;min}\\hat{R}(f)\\tag{1.23}考虑$f_N$的泛化能力\n\nR(f_N)=E[L(Y,f_N(X))]\\tag{1.24}定理1.1(泛化误差上界)对于二分类问题，假设空间中任一函数$f$至少以该利率$1-\\delta$使下列不等式成立：\n\nR(f)\\leqslant \\hat{R}(f)+\\varepsilon(d,N,\\delta)\\tag{1.25}其中\n\\varepsilon(d,N,\\delta)=\\sqrt{\\frac{1}{2N}(log\\;d+log\\frac{1}{\\delta})}\\tag{1.26}不等式的右项就是学到$f_N$的学习方法的泛化误差上界。$\\varepsilon$是关于N的单调递减函数，是关于$\\sqrt{log\\;d}$阶的函数证明(_前提_) $\\mathrm{Hoeffding\\;Inequality}$霍夫丁不等式证明霍夫丁不等式一：设$X$为$[0,1]$的随机变量，经验均值$\\bar{X}=\\frac{1}{n}(X_1+…+X_N)$\n\nP(\\bar{X}-E[\\bar{X}]\\geqslant t)\\leqslant e^{-2nt^2}给定$X$更确切的界$[a_i,b_i]$时，有霍夫丁不等式二：\n\nP(\\bar{X}-E[\\bar{X}]\\geqslant t)\\leqslant \\mathrm{exp}\\left(\\frac{-2n^2t^2}{\\sum_{i=1}^n(b_i-a_i)^2}\\right)\nP(|\\bar{X}-E[\\bar{X}]|\\geqslant t)\\leqslant 2\\mathrm{exp}\\left(\\frac{-2n^2t^2}{\\sum_{i=1}^n(b_i-a_i)^2}\\right )若写成和的形式设$\\displaystyle S_n=\\sum_{i=1}^nX_i$是独立随机变量$X_1,X_2,…,X_n$之和，$X_i\\in [a_i,b_i]$, 则对任意$t&gt;0$, 以下不等式成立：\n\nP(S_n-E[S_n]\\geqslant t)\\leqslant \\mathrm{exp}\\left( {\\frac{-2t^2}{\\sum_{i=1}^n(b_i-a_i)^2}} \\right )\\tag{1.27}\nP(E[S_n]-S_n\\geqslant t)\\leqslant \\mathrm{exp}\\left( {\\frac{-2t^2}{\\sum_{i=1}^n(b_i-a_i)^2}} \\right )\\tag{1.28}霍夫丁不等式给出了随机变量之和与其期望值偏差的概率上界直观上理解若n逐渐变大，不等式的上界趋于0，样本期望越来越接近于总体期望，对于任意函数$f\\in\\mathcal{F}$, $\\hat{R}(f)$是N个独立随机变量$L(Y,f(X))$的样本均值，$R(f)$则是随机变量$L(Y,f(X))$的期望值。由霍夫丁不等式一得：\n\nP({R}(f)-\\hat{R}(f)\\geqslant \\varepsilon)\\leqslant e^{-2N\\varepsilon^2}求\n\n\\begin{align*}\n P(\\exists f\\in \\mathcal{F}:R(f)-\\hat{R}(f)\\geqslant \\varepsilon)\n &=P(\\bigcup_{f\\in\\mathcal{F}}\\{R(f)-\\hat{R}(f)\\geqslant\\varepsilon\\})\\\\\n &\\leqslant \\sum_{f\\in\\mathcal{F}}P(R(f)-\\hat{R}(f)\\geqslant\\varepsilon)\\\\\n & \\leqslant de^{-2N\\varepsilon^2}\n\\end{align*}令\n\n\\delta=de^{-2N\\varepsilon^2}\\tag{1.29 }则\n\nP(R(f)-\\hat{R}(f)","url":"https://blog.luoyayu.cn/post/2018-09-10-统计学习方法一/index.html","headline":"统计学习方法(I)","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2018-09-09T16:00:00.000Z","dateModified":"2018-09-10T12:46:56.000Z","keywords":"统计学习方法","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-09-10-统计学习方法一/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
