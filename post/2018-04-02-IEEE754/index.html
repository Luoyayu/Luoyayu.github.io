<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"计算机组成原理","articleBody":"本文讨论三个问题\n计算机如何表示浮点数，不同平台，处理器，是否一致\n32位精度浮点数float与64位精度浮点数double能表示的范围\n浮点数是如何存储的最后检验 printf(“%d”, 2.5)\n\nIEEE754标准4种浮点数值的表示\n\n单精度\n双精度\n延伸单精确度(43位元以上)\n延伸双精确度(79位元以上)\n\n浮点数表示$\\displaystyle Value=sign\\times exponent\\times fraction$浮点数的实际值等于符号位(sign bit)乘以指数偏移值(exponent bias)再乘以分数值(fraction)\n32位元双精度\n\n\n\n$1$\n$8$\n$23$\n\n\n\n\n$S$\n$Exp$\n$Fraction$\n\n\n$31$\n$30$~$23$ 偏正值$(+127)$\n$22$~$0$\n\n\n\n\n单精度指数范围$-126$ ~ $+127$，指数大小从$1$~$254$($0$和$255$是特殊值)\n单精度浮点数极值在表示浮点数时+127便于比较指数大小\n64位元双精度\n\n\n\n$1$\n$11$\n$52$\n\n\n\n\n$S$\n$Exp$\n$Fraction$\n\n\n$63$\n$62$~$52$ 偏正值$(+1023)$\n$51$~$0$\n\n\n\n\n双精度指数范围$-1022$ ~ $+1023$，指数大小从$1$~$2046$($0$和$2047$是特殊值)\n浮点数的比较浮点数的表示顺序很好的方便了数值比较按照符号位、指数域、尾数域的顺序作字典比较。所有正数大于负数；正负号相同时，指数的二进位表示法更大的其浮点数值更大\n浮点数的舍入\n舍入到最接近：修约到最接近，在一样接近的情况下偶数优先（Ties To Even，这是预设的修约方式）：会将结果修约为最接近且可以表示的值，但是当存在两个数一样接近的时候，则取其中的偶数（在二进位中式以$0$结尾的）。\n朝$+\\infty$方向舍入：会将结果朝正无限大的方向舍入。\n朝$-\\infty$方向舍入：会将结果朝负无限大的方向舍入。\n朝$0$方向舍入：会将结果朝0的方向舍入。\n\n精度第一个有效数字必定是「1」，所以这个「1」并不会储存,称之为“隐藏位”。单精度表示的有效位数$log2^{24}=7.22$(尾数域的第一个1)双精度表示的有效位数$log2^{53}=15.95$由以上的计算，单精和双精浮点数可以保证7位和15位十进制有效数字。\n例子使用单双精度表示$(1001.0111010)_2 = +1.001011101×2^3$\n\n单精度：符号位$0$, 偏移指数$(3+127=130(10000010))$,尾数$1.001011101$隐藏最高位($001011101$) 因此表示为$0\\ 10000010\\ 00101110100000000000000$\n双精度：偏移指数$(3+1023=1026(10000000010))$, 尾数$0010111010000000000000000000000000000000000000000000$ 因此表示为$0\\ 10000000010\\ 0010111010000000000000000000000000000000000000000000$\n\n双精度测试1234#include &lt;stdio.h&gt;  int main() &#123;      printf(\"%d\", 2.55);  &#125;\nx86实验：1234567891011121314151617181920        _,met$$$$$gg.                                                                ,g$$$$$$$$$$$$$$$P.                                                           ,g$$P\"\"       \"\"\"Y$$.\".                                                        ,$$P'              `$$$.                                                      ',$$P       ,ggs.     `$$b:                                                     `d$$'     ,$P\"'   .    $$$                               ,#.                     $$P      d$'     ,    $$P      ##:          :##        :###:                    $$:      $$.   -    ,d$$'      ##'          `##         `#'                     $$;      Y$b._   _,d$P'    __  ##     __     ##  __      _     __          _    Y$$.    `.`\"Y$$$$P\"'     ,####:##  ,######.  ##.#####. :### ,######. ###.####:  `$$b      \"-.__         ,##' `###  ##:  :##  ###' `###  ##' #:   `## `###' `##:  `Y$$b                  ##    `##  ##    ##  ##'   `##  ##    ___,##  ##:   `##   `Y$$.                 ##     ##  #######:  ##     ##  ##  .#######  ##'    ##     `$$b.               ##     ##  ##'       ##     ##  ##  ##'  `##  ##     ##       `Y$$b.            ##.   ,##  ##        ##    ,##  ##  ##    ##  ##     ##         `\"Y$b._         :#:._,###  ##:__,##  ##:__,##' ,##. ##.__:##. ##     ##             `\"\"\"\"       `:#### ###  ######'  `######'  #### `#####\"## ##     ##Linux 4.14.0 x86_64gdb (Debian 7.12-6) 7.12.0gcc version 6.3.0\n启用gdb查看AT&amp;T汇编123456789101112131415(gdb) disassemble mainDump of assembler code for function main():   0x000055bf1bfb67c0 &lt;+0&gt;:\t push   %rbp   0x000055bf1bfb67c1 &lt;+1&gt;:\t mov    %rsp,%rbp   0x000055bf1bfb67c4 &lt;+4&gt;:\t sub    $0x10,%rsp=&gt; 0x000055bf1bfb67c8 &lt;+8&gt;:     mov    0xb1(%rip),%rax # 0x55bf1bfb6880   0x000055bf1bfb67cf &lt;+15&gt;:\tmov    %rax,-0x8(%rbp)   0x000055bf1bfb6
