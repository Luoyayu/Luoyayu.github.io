<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"Machine Learning","articleBody":"第二章 感知机\n第二章 感知机感知机(perceptron)是属于判别模型发的二分类的线性分类器。感知机学习算法分为原始形式和对偶形式。\n感知机模型输入空间$\\mathcal{X}\\subseteq  \\mathbf{R}^n$，输出空间是$\\mathcal{Y}=\\{+1,-1\\}$，输入$x\\in\\mathcal{X}$表示实例的特征向量，输出$y\\in\\mathcal{Y}$表示实例的类别。有输入空间到输出空间的函数：\n\nf(x)=\\mathrm{sign}(w\\cdot x+b) \\tag{2.1}称为感知机，其中$w\\in\\mathbf{R}^n$是感知机模型的权值(weight), $b\\in\\mathbf{R}$叫做偏置(bias), $w\\cdot x$是$w$和$x$的内积， $\\mathrm{sign}$是符号函数，即：\n\n\\mathrm{sign}(x)=\n\\begin{cases}\n +1,& x\\geqslant 0 \\\\ \n -1,& x0所以存在\n\n\\gamma =\\underset{i}{\\mathrm{min}}\\{y_i(w_{opt}\\cdot x_i+b_{opt})\\}使得\n\ny_i(\\hat{w}_{opt}\\cdot \\hat{x}_i)=y_i(w_{opt}\\cdot x_i+b_{opt})\\geqslant\\gamma证明（2）假设感知机算法从$\\hat{w}=0$ 开始，当遇到误分类点时更新权重。令$\\hat{w}_{k-1}$是第$k$个误分类点之前的扩充权值向量，即\n\n\\hat{w}_{k-1}=(w_{k-1}^T, b_{k-1})^T则第$k$个误分类的条件是第$k-1$发生了误分类, 即有\n\ny_{i}(\\hat{w}_{k-1}\\cdot \\hat{x}_{i})=y_i(w_{k-1}\\cdot x_i+b_{k-1})\\leqslant 0\\tag{2.10}假设$(x_i,y_i)$是被$\\hat{w}_{k-1}$误分类的，则有参数更新\n\nw_k \\leftarrow w_{k-1}+\\eta y_ix_i \\\\\nb_k \\leftarrow b_{k-1}+\\eta y_i \\tag{2.11}由此可推导出两个关键的不等式（1）$\\hat{w}_k\\cdot \\hat{w}_{opt}\\geqslant k\\eta\\gamma\\tag{2.12}$由式$(2.11)$得\n\n\\begin{align*}\n\\hat{w}_k\\cdot \\hat{w}_{opt}&=(\\hat{w}_{k-1}+\\eta y_ix_i)\\cdot \\hat{w}_{opt}\\\\\n&=\\hat{w}_{k-1}\\cdot \\hat{w}_{opt}+\\eta y_ix_i\\hat{w}_{opt} \\\\\\\n&\\geqslant \\hat{w}_{k-1}\\cdot \\hat{w}_{opt}+\\eta\\gamma\n\\end{align*}由此可得递推不等式$\\hat{w}_k\\cdot \\hat{w}_{opt}\\geqslant k\\eta\\gamma$（2）$||\\hat{w}_k||\\leqslant k\\eta^2R^2\\tag{2.13}$由式$(2.11)$和$(2.10)$得\n\n\\begin{align*}\n||\\hat{w}_k||^2&=||\\hat{w}_{k-1}||^2+2\\eta y_i\\hat{w}_{k-1}\\hat{x}\n_i+\\eta^2||\\hat{x}_i||^2y_i^2 \\\\\n&\\leqslant ||\\hat{w}_{k-1}||^2+\\eta^2||\\hat{x}_i||^2 \\\\\n&\\leqslant ||\\hat{w}_{k-n}||^2+n\\eta^2||\\hat{x}_i||^2 \\\\\n&\\leqslant k\\eta^2||\\hat{x}_i||^2 \\\\\n&\\leqslant k\\eta^2R^2\n\\end{align*}结合$(2.12)$和$(2.13)$有\n\n\\begin{align*}\nk\\eta\\gamma&\\leqslant\\hat{w}_k\\cdot \\hat{w}_{opt}\\\\\n&\\leqslant ||\\hat{w}_k||\\cdot ||\\hat{w}_{opt}|| \\\\\n&\\leqslant \\sqrt{k}\\eta R||\\hat{w}_{opt}|| \\\\\n\\end{align*}由$||\\hat{w}_{opt}=1||$进一步可得\n\n\\sqrt{k}\\leqslant \\frac{R}{\\gamma}该定理表明了误分类的次数是有上界的， 故当训练集是线性可分时，从$\\hat{w}=0$是能够收敛到某个超平面从而完全正确的分割数据集， 但是得到的超平面却不是唯一的。\n感知机学习算法的对偶形式","url":"https://blog.luoyayu.cn/post/2018-9-15-统计学习方法二/index.html","headline":"统计学习方法(II)","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2018-09-14T16:00:00.000Z","dateModified":"2018-09-15T14:13:18.000Z","keywords":"统计学习方法","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-9-15-统计学习方法二/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
