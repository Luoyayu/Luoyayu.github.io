<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"lang","articleBody":"Go语言快速上手I喜欢Go的函数式编程, 统一的Google代码风格, 这点我很赞同一致使用Google编程规范Google_Cpp_Style_guide_CN.pdf, 少了无聊的争论点; 同时作为Web服务的杀手级语言, 其有着不输给Python的简洁和不差cpp的性能, 但有点简洁过头了都不要class, 泛型, 而且没想到Google的Golang开发者团队如此的固执&gt;好在能快速成型, 跨平台, 静态安全, 类库丰富, 写起来也是很清爽, GoFmt, GoDoc等\b出厂插件也蛮好用的, 在VIM下编写也可以做到实时调用小工具&gt; 自从写了Python, 按照PEP8经常把代码写的左歪右倒, 滚起页来, 单靠缩进完全不知道自己在哪, 虽说有Pycharm加持但是我的600行代码就改个函数名, 波浪线要飘5s;之所以单个Python模块如此大也是因为Python的包调用比较难用, 需要追加依赖路径到sys.path,  相比go指定好goroot就可以层级调用。\n包概念程序以package main的main()函数作为入口, 测试函数我目前在本包写个xxxMain函数, 丢到main包中调用, 这样看起来本包也有了main函数, 当然真正的测试走的是test.go的方法简答。\n函数样例convertToBin把整数类型装换成二进制, 返回字符串\n1234567891011func convertToBin(n int) string &#123;    result := \"\"    if n == 0 &#123;        return \"0\"    &#125;    for ; n &gt; 0; n /= 2 &#123;        lsb := n % 2        result = strconv.Itoa(lsb) + result    &#125;    return result&#125;\nprintFile 简单读文件func NewScanner(r io.Reader) *Scanner\n\nNewScanner returns a new Scanner to read from r. The split function defaults to ScanLines.\n\n1234567891011func printFile(filename string) &#123; // 实用的IO    file, err := os.Open(filename)    if err != nil &#123;        panic(err) // 中断程序并给出错误    &#125;    scanner := bufio.NewScanner(file)    for scanner.Scan() &#123; // 相当于 ;scanner.Scan(); 也就是 while        fmt.Println(scanner.Text())    &#125;&#125;\n死循环没有了while, 本身在cpp已经很少用到了for(;;)==while()\n12345func forever() &#123;    for &#123; // while True        fmt.Println(\"forever\")    &#125;&#125;\n特殊的switchswitch后可以留空, 然后在case补全判断条件, 相当于if…elif…else默认case有break, 除非显式fallthrough较为严格的编译前检查, 未使用的变量必须删去, 或者丢给垃圾变量 _error处理简单粗暴, 带回返回值处理\n12345678910111213141516func eval(a, b int, op string) (int, error) &#123;    switch op &#123; // 可以留空，在case补条件    case \"+\":        return a + // 以+结尾编译时不会被加上分号            b, nil    case \"-\":        return a - b, nil    case \"*\":        return a * b, nil    case \"/\":        q, _ := div(a, b) // unused变量        return q, nil    default:        return 0, fmt.Errorf(\"unsupported operation: \" + op) // fmt的格式化输出    &#125;&#125;\n函数是一等公民函数作为参数传入, 遗憾的是不支持函数重载, 依赖接口, 用户定义作为第二等公民,在这点上对于Go的争论点很多很多, 争论归争论, 学到最后再发言\n123456789101112131415161718192021222324252627func apply(foo func(int, int) int, a, b int) int &#123;    p := reflect.ValueOf(foo).Pointer() // 反射    opName := runtime.FuncForPC(p).Name()    fmt.Printf(\"Calling function %s with args \"+\"(%d %d)\", opName, a, b)    return foo(a, b)&#125;func applyRetString(foo func(int, int, string) (int, error), a, b int, op string) (int, error) &#123;    p := reflect.ValueOf(foo).Pointer()    opName := runtime.FuncForPC(p).Name()    fmt.Printf(\"Calling function %s with args \"+\"(%d %s %d)\\n\", opName, a, op, b)    return foo(a, b, op)&#125;func div(a, b int) (q, r int) &#123;    return a / b, a % b&#125;func main()&#123;    fmt.Println(apply(div, 3, 4))    fmt.Println(apply( // 匿名函数 main.main.func1        func(a, b int) int &#123;            return int(math.Pow(float64(a), float64(b)))        &#125;, 3, 4),    )    fmt.Println(applyRetString(eval, 3, 4, \"++\"))&#125;\n执行外部命令简单的调用终端执行cmd\n123456cmd := exec.Command(\"python3\", \"-c\", \"from math import *;import math;ns = vars(math).copy();ns['__builtins__']=None;print(str(eval(str('cos(3.14/6)+sin(3.14/3)'), ns)))\")    if ans, err := cmd.CombinedOutput(); err == nil &#123;        fmt.Println(string(ans))    &#125; else &#123;        fmt.Println(err)    &#125;\nmap类型统计读入文件重复的行数\n12345678910111213141516171819202122232425262728293031323334353637383940414243444546474849505152535455565758596061626364656667686970717273func countLines(f *os.File, counts map[string]int) &#123;    // map传入指向原内存块的指针, 相当于引用传递    input := bufio.NewScanner(f)    for input.Scan() &#123;        counts[input.Text()]++    &#125;&#125;// 输出出现次数大于1次的行内容func outputDupLines(counts map[string]int) &#123;\t    for line, n := range counts &#123;        if n &gt; 1 &#123;            fmt.Println(n, line)        &#125;    &#125;&#125;// 从标准输入中统计出现次数大于一次的行内容func dup1() &#123;    counts := make(map[string]int) // make创建空map 键string 值int    input := bufio.NewScanner(os.Stdin) // 标准输入    for input.Scan() &#123;        // 读入下一行并且移除行末的换行符, 无输入返回false        counts[input.Text()]++    &#125;    outputDupLines(counts)&#125;func dup2() &#123;    // 练习1.4 “出现重复的行时打印文件名称”    counts := make(map[string]int)    fileNamesList := os.Args[1:] // 获取文件列表    numOfFiles := len(fileNamesList)    if numOfFiles == 0 &#123; // 从标准输入读取文本        countLines(os.Stdin, counts)    &#125; else &#123;        for _, arg := range fileNamesList &#123;            f, err := os.Open(arg)            if err != nil &#123;                fmt.Fprintf(os.Stderr, \"dup2: %v\\n\", err) // %v 自然格式                continue            &#125;            input := bufio.NewScanner(f) // 从文件流中读取文本            for input.Scan() &#123;                curLine := input.Text()                counts[curLine]++            &#125;            f.Close()        &#125;    &#125;    outputDupLines(counts)&#125;// 前两个都是按文件流的形式读取文本// dup3把文本全部读入内存后在操作func dup3() &#123;    counts := make(map[string]int)    for _, fileName := range os.Args[1:] &#123; // 获取命令行参数        data, err := ioutil.ReadFile(fileName)        // 使用io工具包util中的ReadFile一次性读取文本        // ReadFile函数返回一个字节切片        if err != nil &#123;            fmt.Fprintf(os.Stderr, \"dup3: %v\\n\", err)            // 自然格式输出标准错误信息            continue        &#125;        for _, line := range strings.Split(string(data), \"\\n\") &#123;            // 与strings.Join 相反按照提供的sep分割字符串            counts[line]++        &#125;    &#125;    outputDupLines(counts)&#125;\n获取命令行参数1234567891011121314151617181920212223242526272829func echo() &#123;    var s, sep string = \"\", \"\"    for i := 1; i &lt; len(os.Args); i++ &#123;        s += sep + os.Args[i] // os.Args获取命令行字符串        sep = \" \"    &#125;    fmt.Println(s)&#125;func echo1() &#123;    s, sep := \"\", \"\"    for _, arg := range os.Args[1:] &#123; // 第二种索引方法 range产生索引和该处的值        s += sep + arg // +=  产生新的字符创并把值赋给s, 当内容很大时这样的形式代价很高,通常用string包的Join        sep = \" \"    &#125;    fmt.Println(s)&#125;func echo2() &#123;    fmt.Println(strings.Join(os.Args[1:], \" \"))    fmt.Println(os.Args[1:]) // 方括号空格隔开&#125;func echoArg0() &#123;    fmt.Println(os.Args[0])    for indx, arg := range os.Args &#123;        fmt.Println(indx, arg)    &#125;&#125;\nGET 请求12345678910111213141516171819202122232425262728func fetchURL() &#123;    for _, url := range os.Args[1:] &#123;        if strings.HasPrefix(url, \"http://\") == false &#123; // 补充前缀http://            url = \"http://\" + url        &#125;        resp, err := http.Get(url) // GET请求        if err != nil &#123;            fmt.Fprintf(os.Stderr, \"fetch:reading %s: %v\\n\", url, err)            os.Exit(1)        &#125;        statue := resp.Status        fmt.Printf(\"Access %s, statue is %s\", url, statue)        f, err := os.Create(\"resp.txt\") // 创建记录响应的文件        if err != nil &#123;            fmt.Fprintf(os.Stderr, \"Create: %v\\n\", err)            os.Exit(1)        &#125; else &#123;            _, err := io.Copy(f, resp.Body) // 将读取的响应体存到文件中,避免过大的缓冲区            if err != nil &#123;                fmt.Fprintf(os.Stderr, \"Copy: %v\\n\", err)                os.Exit(1)            &#125;        &#125;        // b, err := ioutil.ReadAll(resp.Body)        resp.Body.Close()    &#125;&#125;\n简单并发GET123456789101112131415161718192021222324252627282930313233343536func fetchallMain() &#123;    start := time.Now()    ch := make(chan string) // channel 通道用来在goroutine之间传递参数    for _, url := range os.Args[1:] &#123;        if strings.HasPrefix(url, \"http://\") == false &#123;            url = \"http://\" + url        &#125;        go fetch(url, ch) // go function 创建新的goroutine, 并在进程中执行函数    &#125;    for range os.Args[1:] &#123;        fmt.Println(&lt;-ch) // 每个线程的异步返回, main的goroutine负责接收ch, 防止因main函数提前退出    &#125;    fmt.Printf(\"%.2fs elapsed\\n\", time.Since(start).Seconds()) // 并发总消耗时间&#125;func fetch(url string, ch chan&lt;- string) &#123;    start := time.Now()    resp, err := http.Get(url)    if err != nil &#123;        ch &lt;- fmt.Sprint(err)        return    &#125;    // nbytes, err := io.Copy(ioutil.Discard, resp.Body) // 变量垃圾桶    secs := time.Since(start).Seconds()    // 比较两次访问响应的内容    f, _ := os.Create(\"resp.txt\")    nbytes, err := io.Copy(f, resp.Body)    resp.Body.Close()    if err != nil &#123;        ch &lt;- fmt.Sprintf(\"while reading %s: %v\\n\", url, err) // 当前ch向main异步写回字符串        return    &#125;    ch &lt;- fmt.Sprintf(\"%.2fs %7d %s\\n\", secs, nbytes, url) // 当前ch向main异步写回字符串&#125;\n生成gif12345678910111213141516171819202122232425262728293031323334353637383940414243444546// 调色板var palette = []color.Color&#123;color.White, color.Black&#125;var colorfulPalette = []color.Color&#123;color.White, color.Black,color.RGBA&#123;142, 53, 74, math.MaxUint8&#125;,color.RGBA&#123;131, 138, 45, math.MaxUint8&#125;&#125;// 复合声明生成切片 palette = [&#123;65535&#125; &#123;0&#125;]const ( // 包级别常量    whiteIndex = 0 // 白色在调色板的索引    balckIndex = 1    suohIndex  = 2    kokeIndex  = 3)func gifMain() &#123;    makeGif(os.Stdout, 5, 100, 64, 8) // go build;./gif &gt;out.gif&#125;func makeGif(out io.Writer, cycles, size, nframes, delay int) &#123;    const (        // cycles  = 5 // 圈数        // 练习从URL中获取参数        res     = 0.001        // size    = 100 // 大小        // nframes = 64  // 帧数        // delay   = 8   // 延迟值80ms    )    freq := rand.Float64() * 3.0    anim := gif.GIF&#123;LoopCount: nframes&#125; // 复合声明生成struct结构体    phase := 0.0    for i := 0; i &lt; nframes; i++ &#123; // 生成动画帧        rect := image.Rect(0, 0, 2*size+1, 2*size+1) // 图片大小 201*201        img := image.NewPaletted(rect, palette)        for t := 0.0; t &lt; float64(cycles)*2.0*float64(math.Pi); t += res &#123; // 设置偏振值x, y            x := math.Sin(t)            y := math.Sin(t*freq + phase)            img.SetColorIndex(size+int(x*float64(size)+0.5), size+int(y*float64(size)+0.5), balckIndex)        &#125;        phase += 0.1        anim.Delay = append(anim.Delay, delay)        anim.Image = append(anim.Image, img)    &#125;    gif.EncodeAll(out, &amp;anim)&#125;\n小型WEB服务I123456789func serverMain() &#123;    http.HandleFunc(\"/\", handler) // 处理发送到/后的服务    log.Fatal(http.ListenAndServe(\"localhost:8000\", nil))&#125;func handler(w http.ResponseWriter, r *http.Request) &#123;    fmt.Fprintf(w, \"Listen localhost:8000 url.Path=%q\\n\", r.URL.Path)     // 标准输出流, 写入到http的响应中&#125;\n小型WEB服务II在serve1的基础上添加计数, 和在地址栏为gif输入参数\n1234567891011121314151617181920212223242526272829303132333435363738394041424344454647484950515253545556575859606162636465var mu sync.Mutex // 共享变量var count intfunc server2Main() &#123;    http.HandleFunc(\"/\", handler3)    http.HandleFunc(\"/count\", counter)    http.HandleFunc(\"/gif\", varhandle)    http.HandleFunc(\"/code\", showCode)    // HandleFunc 第二参数可简化传入匿名函数    log.Fatal(http.ListenAndServe(\"10.0.0.100:8000\", nil))&#125;func counter(w http.ResponseWriter, r *http.Request) &#123;    mu.Lock()    fmt.Fprintf(w, \"Count %d\\n\", count)    mu.Unlock()&#125;// 打印请求头更多的内容func handler3(w http.ResponseWriter, r *http.Request) &#123;    mu.Lock() //共享变量加锁    count++    mu.Unlock()    // fmt.Fprintf(w, \"URL.Path=%q\\n\", r.URL.Path)    // Request 结构体    fmt.Fprintf(w, \"%s %s %s\\n\", r.Method, r.URL, r.Proto)    for k, v := range r.Header &#123;        fmt.Fprintf(w, \"Header[%q]=%q\\n\", k, v)    &#125;    fmt.Fprintf(w, \"Host=%q\\n\", r.Host)    fmt.Fprintf(w, \"RemoteAdd=%q\\n\", r.RemoteAddr)    if err := r.ParseForm(); err != nil &#123; // 限制作用域        log.Print(err)    &#125;    for k, v := range r.Form &#123;        fmt.Fprintf(w, \"Form[%q]=%q\\n\", k, v)    &#125;&#125;func varhandle(w http.ResponseWriter, r *http.Request) &#123;    query := r.URL.RawQuery    Q := strings.Split(query, \"?\")    cycles, size, nframes, delay := 5, 100, 64, 8    for _, q := range Q &#123;        switch &#123;        case strings.HasPrefix(q, \"cycles=\"):            cycles, _ = strconv.Atoi(q[7:])        case strings.HasPrefix(q, \"size=\"):            size, _ = strconv.Atoi(q[5:])        case strings.HasPrefix(q, \"nframes=\"):            nframes, _ = strconv.Atoi(q[8:])        case strings.HasPrefix(q, \"delay=\"):            delay, _ = strconv.Atoi(q[6:])        &#125;    &#125;    fmt.Printf(\"请求 cycles=%d size=%d nframes=%d delay=%d\\n\", cycles, size, nframes, delay)    makeGif(w, cycles, size, nframes, delay)&#125;func showCode(w http.ResponseWriter, f *http.Request) &#123;    fileF, _ := os.Open(\"code.txt\")    input := bufio.NewScanner(fileF)    for input.Scan() &#123;        fmt.Fprintln(w, input.Text())    &#125;&#125;\n统计二进制1的个数1234567891011121314151617181920212223242526272829303132333435363738394041424344454647484950515253545556var pc [256]byte // 256 * 8var a [10]intfunc init() &#123; // 初始化, 在编译时自动调用    for x := range pc &#123;        pc[x] = pc[x/2] + byte(x&amp;1)    &#125;&#125;var pC [256]byte = func() (pC [256]byte) &#123;    for x := range pC &#123;        pC[x] = pC[x/2] + byte(x&amp;1)    &#125;    return&#125;()// PopCount 返回64位无符号整数二进制1的位数func PopCount(x uint64) int &#123;    return int(        pc[byte(x&gt;&gt;(0*8))] +            pc[byte(x&gt;&gt;(1*8))] +            pc[byte(x&gt;&gt;(2*8))] +            pc[byte(x&gt;&gt;(3*8))] +            pc[byte(x&gt;&gt;(4*8))] +            pc[byte(x&gt;&gt;(5*8))] +            pc[byte(x&gt;&gt;(6*8))] +            pc[byte(x&gt;&gt;(7*8))])&#125;// PopCounttttLoooop 循环代替单一的表达式func PopCounttttLoooop(x uint64) (cnt int) &#123;    for i := 0; i &lt; 8; i++ &#123;        cnt += int(pC[byte(x&gt;&gt;(uint32(i)*8))])    &#125;    return&#125;// PopCounttttDrop 使用 bit运算 x&amp;(x-1) 每次剔除x最后一位非0bit位func PopCounttttDrop(x uint64) (cnt int) &#123;    for x != 0 &#123;        x &amp;= (x - 1)        cnt++    &#125;    return&#125;// LocalMain for 测试func LocalMain() &#123;    for x := range a &#123; // 默认一位是遍历值        fmt.Println(x)    &#125;    for i, x := range a &#123; // 默认两位是遍历索引和值        fmt.Println(i, x)    &#125;&#125;\n自定义类型1234567891011121314151617181920212223242526272829303132// Package tempconv performs Celsius and Fahrenheit conversions.package tempconvimport (    \"fmt\")// 导出量在声明上方需要有相应的注释, 为了在包的其他文件访问时, 使用godoc查询// Celsius 摄氏度type Celsius float64// Fahrenheit 华氏度type Fahrenheit float64const (    // AbsoluteZeroC 绝对零度    AbsoluteZeroC Celsius = -273.15    // FreezingC 结冰点温度    FreezingC Celsius = 0    // BoilingC 沸水温度    BoilingC Celsius = 100)// 声明类型的方法集func (c Celsius) String() string &#123;    return fmt.Sprintf(\"%g °C\", c)&#125;func (f Fahrenheit) String() string &#123;    return fmt.Sprintf(\"%g °F\", f)&#125;\n12345678910111213141516171819202122232425262728package tempconvimport (    \"fmt\")// C2F 摄氏度2华氏度func C2F(c Celsius) Fahrenheit &#123;    return Fahrenheit(c*9/2 + 32) // 使用显式类型转换操作(非函数)&#125;// F2C 华氏度转化为摄氏度func F2C(f Fahrenheit) Celsius &#123;    return Celsius((f - 32) * 5 / 9)&#125;func tempconvMain() &#123;    c := F2C(212.0)    fmt.Println(c.String()) // 100 °C    fmt.Printf(\"%v\\n\", c)   // 100 °C 优先调用类型的String方法    fmt.Printf(\"%s\\n\", c)   // 100 °C    fmt.Println(c)          // 100 °C    fmt.Printf(\"%g\\n\", c)   // 100    紧凑输出数值    fmt.Println(float64(c)) // 100    zero := AbsoluteZeroC    fmt.Println(zero)&#125;\n命令行标志参数1234567891011121314151617181920212223242526272829303132333435package mainimport (    \"flag\"    \"fmt\"    \"strings\")// flag标志参数, 返回指针// 标志参数的名字, 默认值, 描述信息var n = flag.Bool(\"n\", false, \"omit trailing newline\")var sep = flag.String(\"s\", \" \", \"separator\")var upgrade = flag.Bool(\"upgrade\", false, \"upgrade\")func echo4() &#123;    flag.Parse() // 更新标志参数的值    fmt.Print(strings.Join(flag.Args(), *sep))    if *upgrade &#123;        fmt.Print(\"Upgrading Now!\")    &#125;    if !*n &#123; // 是否输出行末        fmt.Println()    &#125;&#125;func echo4Main() &#123;    echo4()    p := new(int) // 匿名变量    fmt.Printf(\"%v %T %d\\n\", p, p, *p)    *p = 2    fmt.Println(*p)    s := []string&#123;\"hello\", \"world\", \"!\"&#125;    fmt.Println(s)&#125;\n输出当前路径,短变量声明:=的潜在BUG1234567891011121314151617var pwd stringfunc pcwd() &#123;    pwd, err := os.Getwd() // 短变量声明覆盖包级变量, BUG    if err != nil &#123;        log.Fatalf(\"os.Getwd failed: %v\", err)    &#125;    fmt.Printf(\"Working direction = %s\\n\", pwd) // 打印日志信息, 以os.Exit(1)结束&#125;func pcwd2() &#123;    var err error    pwd, err = os.Getwd()    if err != nil &#123;        log.Fatalf(\"os.Getwd failed: %v\", err)    &#125;&#125;\n受约束的指针在golang中指针无法参与运算\n12345678910111213141516171819202122232425262728293031323334353637func pointer() &#123;    var x int    var null *int    x = 2    px := &amp;x    fmt.Printf(\"%v %d %T\\n\", px, *px, px)    *px = 3    fmt.Printf(\"%v %d %T\\n\", px, *px, px)    // &amp;p 取地址    // *p 取值, 作为左值可被赋值, 作为右值可赋值    fmt.Println(null == nil)    // 空指针初始化为零值 nil&#125;func f() *int &#123;    v := 1    return &amp;v&#125;func incr(p *int) int &#123;    *p++    return *p&#125;func sum(ints ...int) (ret int) &#123;    for _, x := range ints &#123;        ret += x    &#125;    return &#125;func point1Main() &#123;    p1, p2 := f(), f()    fmt.Println(*p1, *p2)    fmt.Printf(\"%d %d %d\\n\", *p1, *p2, incr(p1))    fmt.Println(*p1, *p2, p1 == p2, incr(p1))    fmt.Println(sum(1, 2, 3, 4))&#125;\n字符串\b操作-提取路径的文件名,itoa\n","url":"https://blog.luoyayu.cn/post/2018-08-03-learning Go/index.html","headline":"Learning Golang I","image":"https://blog.luoyayu.cn/favicon.ico
