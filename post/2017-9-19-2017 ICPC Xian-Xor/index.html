   build(v, u, d+1);        siz[u]+=siz[v];        if(siz[v]&gt;tmpsz)            tmpsz=siz[maxszid=v];    &#125;    son[u]=maxszid;&#125;int n,m,q; //m=int(sqrt(n+0.5));void dfs(int u, int sp) &#123;//ж ‘еү– жһ„йҖ  id,fid,Top    top[u]=sp;tid[u]=++cnt;    fid[cnt]=u;    for(int i=1;i&lt;=m;i++)//д»Һuи·іiзә§жӯҘ,зӣҙеҲ°ж №иҠӮзӮ№зҡ„ејӮжҲ–еҖј        Xor[u][i] = Xor[anc[u][i]][i]^val[u];    if(son[u]) dfs(son[u], sp);    for(int i=head[u],v;~i;i=e[i].next) &#123;        if((v=e[i].to)==anc[u][1] || v==son[u]) continue;        dfs(v,v);    &#125;&#125;int retLCA(int x,int y) &#123;//з”ұйҮҚй“ҫжұӮеҮәжҺЁеҮәlca    for(;top[x]!=top[y]; dep[top[x]]&gt;dep[top[y]] ?        x=anc[top[x]][1] : y=anc[top[y]][1]);    return dep[x]&lt;dep[y]?x:y;&#125;int Jump(int x,int k) &#123;//д»Һxеҗ‘дёҠи·іkжӯҘиҝ”еӣһxзҡ„kзә§зҘ–е…Ҳ    if(dep[x]&lt;=k) return 0;//дёҖжқЎй“ҫдёҠdep(x)==dis(x,root)    int y=top[x],DIS;    while(x &amp;amp;&amp;amp; k&gt;=(DIS=(dep[x]-dep[y]+1))) &#123;        k-= DIS;        x=anc[y][1],y=top[x];    &#125;    if(x==0) return 0;    return fid[tid[x]-k];&#125;int RET(int x,int lca,int k) &#123;//иҝ”еӣһ(x,lca,k)зҡ„иҝһз»ӯејӮжҲ–    int ret = 0;    if(dep[x]&lt;=dep[lca]) return 0;    if(k&lt;=m) &#123;//зӣҙжҺҘи·іеҲ°        ret ^= Xor[x][k];        while(dep[x]&gt;dep[lca])            x = Jump(x, k);        return ret ^ Xor[x][k];    &#125;    ret ^= val[x];    while(dep[x]&gt;dep[lca]+k) &#123;        x=Jump(x,k);        ret ^= val[x];    &#125;    return ret;&#125;inline void init() &#123;    clr(head,-1);clr(Xor,0);    cnt=ecnt=0;&#125;int main() &#123;    while(scanf(\"%d%d\",&amp;amp;n,&amp;amp;q)!=EOF) &#123;        m = (int)sqrt(n+0.5);        init();        for(int i=1;i&lt;n;i++) addedge2(read(),read());        for(int i=1;i&lt;=n;i++) val[i]=read();        build(1,0,1);        for(int i=1;i&lt;=n;i++)            for(int j=2;j&lt;=m;j++)                anc[i][j] = anc[anc[i][j-1]][1];        dfs(1,1);        while(q--) &#123;            int u=read(),v=read(),k=read(
