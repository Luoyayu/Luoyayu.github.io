<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"ACM","articleBody":"这段时间做了区间DP在此总结下POJ 1651 Multiplication Puzzle题意给出序列$a$,求出最小得分—— 取出的数左边的数右边的数 (不能取两边)，实质为矩阵链乘变形，设$dp[i][j]$为取光$(i,j)$之间的元素所得的最小值, $k$为区间$(i,j)$最后取出的元素，这样转移就可以维持状态方程的一致性$cmin(dp[i][j], DP(l,k)+DP(k,r)+a[k] \\cdot a[l] \\cdot a[r])$，因为如果$k$为第一次取出的元素的话不好确定$k$左右的临近元素\n写法区间DP入门题之记忆化写法\n1234567891011121314151617181920212223242526#include &lt;bits/stdc++.h&gt;using namespace std;const int maxn = 100 + 5;const int inf = 0x3f3f3f3f;inline int read() &#123;    int x=0,f=1;char ch=getchar();    while(ch&lt;'0'||ch&gt;'9')&#123;if(ch=='-')f=-1;ch=getchar();&#125;    while(ch&gt;='0'&amp;amp;&amp;amp;ch&lt;='9')&#123;x=x**10+ch-'0';ch=getchar();&#125;    return x**f;&#125;int dp[maxn][maxn];int a[maxn];int DP(int l, int r) &#123;    if(~dp[l][r])return dp[l][r];    if(r-l==1) return dp[l][r] = 0;    dp[l][r] = inf;    for(int k=l+1; k&lt;=r-1; ++k)//枚举最后取出的点        dp[l][r] = min(dp[l][r], DP(l,k)+DP(k,r)+a[k]&amp;#42;a[l]&amp;#42;a[r]);    return dp[l][r];&#125;int main() &#123;    int n = read();    for(int i=1;i&lt;=n;i++) a[i] = read();    memset(dp,-1,sizeof dp);    return !printf(\"%d\\n\",DP(1,n));&#125;\n之迭代写法\n1234567891011121314151617181920212223242526272829#include&lt;bits/stdc++.h&gt;using namespace std;inline int read() &#123;    int x=0,f=1;char ch=getchar();    while(ch&lt;'0'||ch&gt;'9')&#123;if(ch=='-')f=-1;ch=getchar();&#125;    while(ch&gt;='0'&amp;amp;&amp;amp;ch&lt;='9')&#123;x=x**10+ch-'0';ch=getchar();&#125;    return x**f;&#125;int dp[105][105];int a[105];int main() &#123;    int n = read();    for(int i=1;i&lt;=n;i++) a[i] = read();    memset(dp,0,sizeof(dp));    for(int len = 2;len &lt;= n-1; len++) &#123;        for(int i=1;i&lt;=n-len;i++) &#123;            int j=i+len;            if(len==2) dp[i][j] = a[i]**a[i+1]**a[i+2];            else &#123;                for(int k=i+1;k&lt;j;k++)                    if(dp[i][j]==0)                        dp[i][j] = dp[i][k]+dp[k][j]+a[i]&amp;#42;a[k]&amp;#42;a[j];                    else dp[i][j]=min(                        dp[i][j], dp[i][k]+dp[k][j]+a[i]&amp;#42;a[j]&amp;#42;a[k]);            &#125;        &#125;    &#125;        return !printf(\"%d\\n\",dp[1][n]);&#125;\nHDU 5115 Dire Wolf题意给出$n$只狼, 每只狼有基础攻击和给相邻的带去增益攻击,问以一个怎样的消灭顺序能得到最少的伤害\n解法区间$DP$，设$dp[i][j]$为消灭区间$(i,j)$所有狼收到的最小伤害,那么当$i=j+1$时$dp[i][j]=0$\n设$k$为区间$(i,j)$最后取出的元素，递归处理$[l,r]$区间的每一个元素$cmin(dp[i][j],DP(l,k)+DP(k,r)+a[k]+b[l]+b[r])$\n代码：\n123456789101112131415161718192021222324252627#include&lt;bits/stdc++.h&gt;using namespace std;const int maxn = 222;const int inf = 0x3f3f3f3f;#define cmin(a,b) a=min(a,b);typedef long long ll;ll a[maxn],b[maxn],dp[maxn][maxn];ll DP(int l,int r) &#123;    if(~dp[l][r]) return dp[l][r];    if(r-l==1) return 0; //递归边界    dp[l][r] = inf;    for(int k=l;k&lt;=r;k++)//枚举最后取出的元素k        cmin(dp[l][r],DP(l,k)+DP(k,r)+a[k]+b[l]+b[r]);    return dp[l][r];&#125;int main() &#123;    int t;scanf(\"%d\",&amp;amp;t);    for(int kase=1;kase&lt;=t;kase++)    &#123;        int n;scanf(\"%d\",&amp;amp;n);        for(int i=1;i&lt;=n;i++) scanf(\"%lld\",&amp;amp;a[i]);        for(int i=1;i&lt;=n;i++) scanf(\"%lld\",&amp;amp;b[i]);        memset(dp,-1,sizeof(dp));        a[0] = a[n+1] = b[0] = b[n+1] = 0;        printf(\"Case #%d: %lld\\n\",kase,DP(0,n+1));    &#125;return 0;&#125;\nHDU 4570Multi-bit Trie题意$LPM$最长前缀匹配从转发信息库$(FIB)$中找出匹配输入数据包的目的地址输出相应的$Next \\ Hop \\ information$变态题意：一个长度为$n$的数列将其分成若干段每一段长度要求小于$20$，$\\sum(a_i\\times (2^{b_i}))$ $b_i$是每一段的长度，$a_i$是每一段的首元素的值。样例$n=7,A={1,2,4,4,5,4,3}$的最佳分法是$1 \\ 2 \\ 4 \\ | \\ 4 \\ 5\\ |\\  4\\  |\\  3$ ,这样的$\\sum=1\\times 8+4\\times 4+4\\times 2+3\\times 2=38$\n解法：区间$DP$ ，序列的长度不超过64，每层长度不大于20\n代码1234567891011121314151617181920212223242526272829#include &lt;bits/stdc++.h&gt;using namespace std;typedef long long ll;//题意比较绕大意是给出序列a,问一种划分n层使得\\sum a_i**(2^(b_i))的值最小//其中a_i是每一层首元素的值,b_i是每一层的元素个数//其中要求每一层的元素个数小于20，那么初始化的时候可以对于j-i&lt;20,dp[i][j]=a[i]**(1LL&lt;&lt;(j-i+1))//状态转移方程dp[i][j]=min(dp[i][j],dp[i][k]+dp[k+1][j]);//即i到j层的和是等于由i到k层加上k+1到j层递归形成的const int maxn =65;const int inf = 0x3f3f3f3f;#define cmin(a,b) a=min(a,b);ll a[maxn],dp[maxn][maxn]; // 一种写法：设dp[i][j]表示从第i层到第j层的代价int main() &#123;    int t;scanf(\"%d\",&amp;amp;t);    while(t--)  &#123;        int n;scanf(\"%d\",&amp;amp;n); //最多分n层        for(int i=1;i&lt;=n;i++) scanf(\"%lld\",&amp;amp;a[i]);        for(int i=1;i&lt;=n;i++)            for(int j=i;j&lt;=n;j++)                if(j-i+1&lt;=20) dp[i][j]=a[i]*(1LL&lt;&lt;(j-i+1));//对于分的层数小于20的                else dp[i][j]=inf;        for(int l=1;l&lt;=n;l++)            for(int r=l;r&lt;=n;r++) //枚举[l,r]                for(int k=l;k&lt;=r;k++)//枚举k位置                    cmin(dp[l][r], dp[l][k]+dp[k+1][r]);        printf(\"%lld\\n\",dp[1][n]);        // printf(\"%lld\\n\",DP(1,n));    &#125;return 0;&#125;\nCF 149 D Coloring Brackets题意给出括号序列染色要求  1.括号要么不被染色要么染成红或蓝色  2.相邻的括号要染色保持不同  3.相匹配的括号有且只有一个被染色\n$dp[l][r][x][y]$为$[l,r]$表示给$[l,r]$染色且端点$l$染$x$色，右端点$r$染$y$色 分别为if  is matched ,那么由去掉这个嵌套的$dp[l+1][r-1][x][y]$转移出$dp[l][r][x][y]$枚举$l+1,r-1$的颜色\n\ni->l+1; j->r-1;        \nif(i!=1) dp[l][r][1][0]=(dp[l][r][1][0] + dp[l+1][r-1][i][j])%mod;   \nif(i!=2) dp[l][r][2][0]=(dp[l][r][2][0] + dp[l+1][r-1][i][j])%mod;   \nif(j!=1) dp[l][r][0][1]=(dp[l][r][0][1] + dp[l+1][r-1][i][j])%mod;    \nif(j!=2) dp[l][r][0][2]=(dp[l][r][0][2] + dp[l+1][r-1][i][j])%mod;   \n\n\nif  isn’t matched,那么可以找到和l匹配的括号位置mid,求出$dp[l][mid][][]$和$dp[mid+1][r][][]$枚举$l,mid,mid+1,r$这四个位置的颜色$i,j,x,y$ 有转移方程if(j*x==0||j!=x) $dp[l][r][i][y]=(dp[l][r][i][y] + dp[l][mid][i][j] \\times dp[mid+1][r][x][y]%mod)%mod$;\n代码12345678910111213141516171819202122232425262728293031323334353637383940414243444546474849505152535455565758#include &lt;bits/stdc++.h&gt;using namespace std;typedef long long ll;const int maxn = 700 + 7;const int mod = int(1e9 + 7);int belong[maxn];ll dp[maxn][maxn][3][3];char ss[maxn];void dfs(int l, int r) &#123;    if(r-l==1) &#123;        dp[l][r][0][1] = dp[l][r][0][2]=dp[l][r][1][0]=dp[l][r][2][0] = 1;        return ;    &#125;    if(belong[l]==r) &#123;        dfs(l+1,r-1);//一直递归到小区间处理        for(int i=0;i&lt;3;i++)            for(int j=0;j&lt;3;j++) &#123;                if(i!=1) dp[l][r][1][0]=(dp[l][r][1][0] + dp[l+1][r-1][i][j])%mod;                if(i!=2) dp[l][r][2][0]=(dp[l][r][2][0] + dp[l+1][r-1][i][j])%mod;                if(j!=1) dp[l][r][0][1]=(dp[l][r][0][1] + dp[l+1][r-1][i][j])%mod;                if(j!=2) dp[l][r][0][2]=(dp[l][r][0][2] + dp[l+1][r-1][i][j])%mod;            &#125;    &#125; else &#123;        int mid = belong[l];        dfs(l,mid);dfs(mid+1,r);        for(int i=0;i&lt;3;i++)        for(int j=0;j&lt;3;j++)        for(int x=0;x&lt;3;x++)        for(int y=0;y&lt;3;y++)&#123;//&lt;i,j&gt;, &lt;x,y&gt;        if(j*x!=0 &amp;amp;&amp;amp; j==x) continue;        dp[l][r][i][y]=(dp[l][r][i][y] + dp[l][mid][i][j] * dp[mid+1][r][x][y]%mod)%mod;       &#125;    &#125;&#125;int main() &#123;    while(scanf(\"%s\",ss)!=EOF) &#123;        int len = strlen(ss);        for(int i=0;i&lt;len;i++)//处理匹配            if(ss[i]=='(') &#123;                int cnt = 0;                for(int j=i;j&lt;len;j++)&#123;                    if(ss[j] =='(') cnt++;                    else cnt--;                    if(cnt==0) &#123;                        belong[i] = j;                        break;                    &#125;                &#125;            &#125;        memset(dp,0, sizeof(dp));        dfs(0,len-1);        ll ans = 0;        for(int i=0;i&lt;3;i++)            for(int j=0;j&lt;3;j++)                ans = (ans + dp[0][len-1][i][j])%mod;        printf(\"%lld\\n\",ans);    &#125;return 0;&#125;\nUVA 10003 Cutting Sticks题意给出长度为$N$的木条，要在$i-th$点位置切割，每次切割的代价是当前切割块的木条的长度。给出要切割的点问最小的花费。\n解法区间$DP$，对于区间的划分顺序影响总结果用区间$DP$，带上代价划分\n代码123456789101112131415161718192021222324#include&lt;bits/stdc++.h&gt;using namespace std;const int maxn = 55;const int inf = 0x3f3f3f3f;#define cmin(a,b) a=min(a,b);int a[maxn],dp[maxn][maxn];//设dp[i][j]为切割第i到第j位置的最小代价int DP(int l,int r) &#123;//区间(i,j)    if(~dp[l][r]) return dp[l][r];    if(r-l==1) return 0;    dp[l][r] = inf;    for(int k=l+1;k&lt;=r-1;k++)        cmin(dp[l][r],DP(l,k)+DP(k,r)+a[r]-a[l]);    return dp[l][r];&#125;int main() &#123;    int n,L;    while(scanf(\"%d\",&amp;amp;L)!=EOF&amp;amp;&amp;amp;L) &#123;        scanf(\"%d\",&amp;amp;n);        for(int i=1;i&lt;=n;i++) scanf(\"%d\",&amp;amp;a[i]);        memset(dp,-1,sizeof(dp));        a[0]=0,a[n+1]=L;        printf(\"The minimum cutting is %d.\\n\",DP(0,n+1));//注意输出格式    &#125; return 0;&#125;","url":"https://blog.luoyayu.cn/post/2017-10-18-区间DP小结/index.html","headline":"区间DP","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2017-10-17T16:00:00.000Z","dateModified":"2018-08-25T02:46:33.000Z","keywords":"ACM-总结,ACM-区间DP,ACM-DP","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2017-10-18-区间DP小结/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
