<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"ACM","articleBody":"Introductioncf 502场 C的一道构造题背后的离散数学原理：Dilworth定理\n题意构造一个排列，使得$LIS+LDS$最小, 例如：n=22vaild permutation: 19 20 21 22 15 16 17 18 11 12 13 14 7 8 9 10 3 4 5 6 1 2LIS=4 LDS=6\n思路构造方法：$[LIS]&lt;[LIS]&lt;[LIS]&lt;\\cdot \\cdot \\cdot &lt;[LIS]$, 显然如何证明取$LIS=\\sqrt{n}, LDS=\\left \\lceil  \\frac{n}{LIS} \\right \\rceil$时构造出的$LIS+LDS$最小。\n证明\nPartially order set\n在偏序集(X,&lt;)中，如果两个元素a, b，有关系a&lt;b或b&lt;a，则称a,b是可比的，否则称为a, b是不可比的\nAn antichain in a partially ordered set is a set of elements no two of which are comparable to each other；\nA chain is a set of elements every two of which are comparable；\nDilworth’s theorem: In any finite partially ordered set, the maximum number of elements in any antichain equals the minimum number of chains in any partition of the set into chains. 在任何有限偏序集中，反链的最大长度等于把集合划分成链的最小数量。\nDual of Dilworth’s theorem (Mirsky’s theorem)：the size of the largest chain in a partial order (if finite) equals the smallest number of antichains into which the order may be partitioned，有限偏序集的链的最大长度等于能划分集合的反链的最小数量。\n\n本题中的偏序集({permutation N}, &lt;), 每个[LIS]是反链，[LDS]是链，反链划分了这个集合，要求LIS+LDS\n根据定理的对偶形式：LDS = numbers of [LIS], 最长链就是每块[LIS]贡献仅有一个元素,有LIS*LIS=n,  LIS=sqrt(n)，有LDS=ceil(n/sqrt(n))\n代码\n\n练习HDU 3335 Divisibility题意&amp;思路给出$n$个数(long long), 求出最大的集合的大小，在这个集合中元素之间不存在整除关系。本题的偏序集{(n个数),整除} 要求反链的最大长度，应用定理需要找出最小数量的划分子集例如：\n\n1 2 3 =&gt; 1 2|3 ans=2 找出最小数量的集合划分,其中集合中的任意两个元素有整除关系2 3 4 5 6 9 =&gt; 2 4|3 6|5|9 ans=4\n\n此处暴力$n^2$\n代码\n\nPOJ 1065题意&amp;思路给出n个木棍，我们定义加工这些木棍所需要的时间为：加工第一根木棍需要时间1, 随后的木棍如果长度和重量都大于等于上一根，则不需要额外时间，否则需要额外时间1来调整机器，问一个最小的操作时间。例如：\n\n54 9 5 2 2 1 3 5 1 432 2 1 1 2 231 3 2 2 3 1\n\n本题的偏序集 (X,Y,&lt;) 求的是链的个数应用定理：在任何有限偏序集中，反链的最大长度等于把集合划分成链的最小数量所以本题我们可以求按第一关键字排序后，第二关键字严格递减的最长长度。这里我们求解采用dp+二分，复杂度$nlogn$\n代码\n\n参考\nhttps://www.wikiwand.com/en/Dilworth’s_theorem\n\n","url":"https://blog.luoyayu.cn/post/2018-08-09-Dilworth定理/index.html","headline":"Dilworth定理与构造题","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2018-08-08T16:00:00.000Z","dateModified":"2018-08-25T03:08:05.000Z","keywords":"ACM-codeforces,ACM-数学","description":"Introductioncf 502场 C的一道构造题背后的离散数学原理：Dilworth定理","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-08-09-Dilworth定理/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
