<script type="application/ld+json">[{"@context":"http://schema.org","@type":"WebSite","publisher":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"url":"https://blog.luoyayu.cn","image":"https://blog.luoyayu.cn/favicon.ico","description":"ACM","author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"}},{"@context":"http://schema.org","@type":"Article","articleSection":"ACM","articleBody":"DescriptionA knight jumps around an infinite chessboard. The chessboard is an unexplored territory. In the spirit of explorers, whoever stands on a square for the first time claims the ownership of this square. The knight initially owns the square he stands, and jumps $N$ times before he gets bored. Recall that a knight can jump in 8 directions. Each direction consists of two squares forward and then one squaure sidways.   After $N$ jumps, how many squares can possibly be claimed as territory of the knight? As $N$ can be really large, this becomes a nightmare to the knight who is not very good at math. Can you help to answer this question?\ninputThe first line of the input gives the number of test cases, $T$. $T$ test cases follow.Each test case contains only one number $N$, indicating how many times the knight jumps.$1 \\leq T \\leq 10^5$,$0 \\leq N \\leq 10^9$\noutputFor each test case, output one line containing Case #x: y, where $x$ is the test case number (starting from 1) and $y$ is the number of squares that can possibly be claimed by the knight.\n2017 CCPC FINAL12345678910111213141516171819#include&lt;bits/stdc++.h&gt;using namespace std;typedef unsigned long long ull;typedef long long ll;// 打表推公式int a[]=&#123;1,9,41,109,205,325,473&#125;;int main() &#123;    int t;scanf(\"%d\", &amp;t);    for(int kase=1; kase&lt;=t; kase++)&#123;        ll n;scanf(\"%lld\", &amp;n);        printf(\"Case #%d: \", kase);        if(n&lt;=6) &#123;            printf(\"%d\\n\",a[n]);            continue;        &#125;        printf(\"%llu\\n\",176 * (n-6) + (n-6) * (n-7) * 14 + 473);    &#125;    return 0;&#125;\n思路Python打表\n代码123456789101112131415161718192021222324252627282930313233#include&lt;bits/stdc++.h&gt;int dir[][2]=&#123;&#123;-2,1&#125;,&#123;-1,2&#125;,&#123;1,2&#125;,&#123;2,1&#125;,&#123;1,-2&#125;,&#123;2,-1&#125;,&#123;-2,-1&#125;,&#123;-1,-2&#125;&#125;;struct node&#123;    int x, y, steps;&#125;;const int maxn = 1111;int ans[maxn];bool vis[maxn][maxn];void bfs() &#123;    queue&lt;node&gt; q;    q.push(node&#123;500,500,0&#125;);    ans[0] = 1;    vis[500][500] = 1;    while(!q.empty())&#123;        node cur = q.front(); q.pop();        if(cur.steps == 20) continue;        for(int i=0; i&lt;8; i++)&#123;            node nxt = cur;            nxt.x += dir[i][0], nxt.y += dir[i][1];            if(vis[nxt.x][nxt.y]) continue;            vis[nxt.x][nxt.y] = 1;            ans[++nxt.steps] ++;            q.push(nxt);        &#125;    &#125;&#125;int main() &#123;    bfs(); int ret = 0;    for(int i=0;i&lt;=20;i++) printf(\"%d \", ans[i]);puts(\"\");    for(int i=0;i&lt;20;i++) printf(\"%d \", (ret+=ans[i])); puts(\"\");    for(int i=1;i&lt;20;i++) printf(\"%d \",ans[i]-ans[i-1]);    for(int i=7;i&lt;=20;i++) printf(\"%d \",176 * (i-6) + (i-6) * (i-7) / 2 * 28 + 473);&#125;","url":"https://blog.luoyayu.cn/post/2018-02-01-hdu 6253 knightmare/index.html","headline":"HDU 6253 knightmare 2017CCPC-K","image":"https://blog.luoyayu.cn/favicon.ico","datePublished":"2018-02-08T16:00:00.000Z","dateModified":"2018-08-25T02:50:03.000Z","keywords":"ACM-打表","description":"ACM","publisher":{"@type":"Organization","name":"ACM","logo":{"@type":"ImageObject","url":"https://blog.luoyayu.cn/favicon.ico"}},"author":{"@type":"Person","name":"Luoyayu","description":"Stay Hungry. Stay Foolish.","image":"/images/avatar2.jpg"},"inLanguage":{"@type":"Language","alternateName":"zh-Hans"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://blog.luoyayu.cn/post/2018-02-01-hdu 6253 knightmare/index.html"}}]</script><script async src="https://www.googletagmanager.com/gtag/js?id=UA-123669885-1"></script>
